syntax = "proto3";

package querylane.console.v1alpha1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

// Service for viewing PostgreSQL extensions available in a database.
service ExtensionService {
  // Lists extensions available in a given Database, including whether each
  // extension is installed in that database.
  rpc ListExtensions(ListExtensionsRequest) returns (ListExtensionsResponse) {}
}

// A PostgreSQL extension available in a Database.
message Extension {
  option (google.api.resource) = {
    type: "console.querylane.dev/Extension"
    pattern: "instances/{instance}/databases/{database}/extensions/{extension}"
    plural: "extensions"
    singular: "extension"
  };

  // Output-only identifier. The unique resource name of the extension.
  // Format: instances/{instance}/databases/{database}/extensions/{extension}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Output-only. The extension name from pg_available_extensions.
  string display_name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. Schema where the extension is installed. Empty when the
  // extension is available but not installed.
  string schema = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. Default version available on the connected PostgreSQL server.
  string default_version = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. Installed version in this database. Empty when not installed.
  string installed_version = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. Short description from pg_available_extensions.
  string comment = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. Whether the extension is installed in this database.
  bool installed = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
}

message ListExtensionsRequest {
  // Required. The parent Database from which to list extensions.
  // Format: instances/{instance}/databases/{database}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (google.api.resource_reference) = {type: "console.querylane.dev/Database"},
    (buf.validate.field).string.pattern = "^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?/databases/[^/]+$"
  ];

  // Optional. The maximum number of extensions to return. Server may return fewer.
  // If unspecified or 0, server will choose a reasonable default (typically 50).
  // Maximum value is 1000.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A page token received from a previous `ListExtensions` call.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Filter expression (an AIP-160 subset: `=`, `!=`, the `:`
  // case-insensitive substring operator, combined with `AND`). Values are
  // quoted strings or the bare bools true/false. Filterable fields:
  //   - name, schema (string; support the `:` substring operator)
  //   - installed (bool)
  // Examples:
  //   - installed = true
  //   - name:"trgm"
  //   - schema = "public" AND installed = true
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Ordering expression following AIP-132 syntax.
  // Supported fields: name, schema, installed
  // Default: "name asc"
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

message ListExtensionsResponse {
  // The list of extensions available in the database.
  repeated Extension extensions = 1;

  // A token to retrieve the next page of results.
  // If this field is empty, there are no subsequent pages.
  string next_page_token = 2;
}
