syntax = "proto3";

package querylane.console.v1alpha1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "querylane/console/v1alpha1/catalog_sync.proto";

// --------------------------------------------------------------------------
// Service
// --------------------------------------------------------------------------

// Service for managing schemas within databases.
service SchemaService {
  // Lists schemas available in a given Database.
  rpc ListSchemas(ListSchemasRequest) returns (ListSchemasResponse) {}

  // Gets the details of a specific Schema.
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse) {}
}

// --------------------------------------------------------------------------
// Resource Messages
// --------------------------------------------------------------------------

// A Schema represents a namespace for tables within a Database.
message Schema {
  option (google.api.resource) = {
    type: "console.querylane.dev/Schema"
    pattern: "instances/{instance}/databases/{database}/schemas/{schema}"
    plural: "schemas"
    singular: "schema"
  };

  // Output-only identifier. The unique resource name of the schema.
  // Format: instances/{instance}/databases/{database}/schemas/{schema}
  string name = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_behavior) = IDENTIFIER
  ];

  // Output-only. The display name of the schema.
  string display_name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. The PostgreSQL role that owns this schema.
  string owner = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. Whether this is a system schema that should typically
  // be hidden from end users (e.g., information_schema, pg_catalog).
  bool is_system_schema = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. The last time a DDL operation was performed on this schema.
  google.protobuf.Timestamp last_ddl_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. The time when the schema was created.
  google.protobuf.Timestamp create_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// --------------------------------------------------------------------------
// RPC request/response messages
// --------------------------------------------------------------------------

// --- ListSchemas RPC ---

message ListSchemasRequest {
  // Required. The parent Database from which to list schemas.
  // Format: instances/{instance}/databases/{database}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "console.querylane.dev/Database"},
    (buf.validate.field).string.pattern = "^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?/databases/[^/]+$"
  ];

  // Optional. The maximum number of schemas to return. Server may return fewer.
  // If unspecified or 0, server will choose a reasonable default (typically 50).
  // Maximum value is 1000.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A page token received from a previous `ListSchemas` call.
  // Provide this to retrieve the next page of results.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Filter expression (an AIP-160 subset: `=`, `!=`, the `:`
  // case-insensitive substring operator, combined with `AND`). Values are
  // quoted strings or the bare bools true/false. Filterable fields:
  //   - name, owner (string; support the `:` substring operator)
  //   - is_system_schema (bool)
  // Examples:
  //   - is_system_schema = false (exclude system schemas)
  //   - owner = "postgres"
  //   - name:"app"
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Ordering expression following AIP-132 syntax.
  // Supported fields: name, display_name, owner, last_ddl_time
  // Default: "name asc"
  //
  // Examples:
  //   - "name asc"
  //   - "last_ddl_time desc, name asc"
  //   - "owner desc"
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

message ListSchemasResponse {
  // The list of schemas found in the database.
  repeated Schema schemas = 1;

  // A token to retrieve the next page of results.
  // If this field is empty, there are no subsequent pages.
  string next_page_token = 2;

  // Output-only. Freshness and sync status for this catalog list.
  CatalogSyncMetadata sync_metadata = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// --- GetSchema RPC ---

message GetSchemaRequest {
  // Required. The name of the schema to retrieve.
  // Format: instances/{instance}/databases/{database}/schemas/{schema}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (google.api.resource_reference) = {type: "console.querylane.dev/Schema"},
    (buf.validate.field).string.pattern = "^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?/databases/[^/]+/schemas/[^/]+$"
  ];
}

message GetSchemaResponse {
  // The retrieved schema resource.
  Schema schema = 1;
}
