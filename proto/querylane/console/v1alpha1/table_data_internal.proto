syntax = "proto3";

package querylane.console.v1alpha1;

import "google/protobuf/timestamp.proto";
import "querylane/console/v1alpha1/table.proto";
import "querylane/console/v1alpha1/table_data.proto";

// --------------------------------------------------------------------------
// Token payloads (server-internal)
// --------------------------------------------------------------------------
//
// All three opaque tokens (ReadRowsResponse.next_page_token,
// TableResultRow.row_key, TableCell.full_value_token) share the same
// envelope: a proto payload + HMAC-SHA256, base64url-encoded:
//
//   base64url(proto_bytes) + "." + base64url(hmac_sha256(proto_bytes, key))
//
// These messages are versioned in the public proto package so the wire
// shape evolves alongside the rest of the service, but they are NOT meant
// for direct client consumption — clients always treat the encoded token
// as opaque. Names are scoped to the consuming field.

// Encodes a keyset cursor for ReadRowsResponse.next_page_token. The token
// is bound to (table, projection, filter, order, page_size); reusing it
// against a different query returns INVALID_ARGUMENT. cursor_values are
// the order-column values from the last row of the previous page (visible
// columns + any server-appended identity tiebreaker).
message ReadRowsPageTokenPayload {
  uint32 version = 1;
  string table_name = 2;

  // SHA-256 of the canonical filter representation.
  bytes filter_hash = 3;

  // SHA-256 of the canonical order representation, including the
  // server-appended identity tiebreaker.
  bytes order_hash = 4;

  // SHA-256 of the sorted projected column list.
  bytes projection_hash = 5;

  int32 page_size = 6;

  // For PAGINATION_STRATEGY_KEYSET: one per ORDER BY column
  // (visible + tiebreaker) carrying the last row's values.
  // Empty for OFFSET.
  repeated TableValue cursor_values = 7;

  // Server enforces a 24h TTL.
  google.protobuf.Timestamp issued_at = 8;

  // Strategy used by the issuing query. Restored on next page.
  PaginationStrategy strategy = 9;

  // For PAGINATION_STRATEGY_OFFSET: the offset of the next page.
  // Ignored for KEYSET.
  int64 offset = 10;
}

// Encodes a stable identity for a single row, used by future Update/Delete
// row APIs. Decoded form of TableResultRow.row_key.
message TableRowKeyPayload {
  uint32 version = 1;
  string table_name = 2;

  // How identity was derived (PK / unique / opaque ctid).
  RowIdentity row_identity = 3;

  // Identity column values, in the same order as row_identity.column_names.
  // For SOURCE_OPAQUE_ROW_KEY this carries a single bytes_value with the ctid.
  repeated TableValue identity_values = 4;

  // Server enforces a TTL: 1h for PK/unique, 5min for ctid.
  google.protobuf.Timestamp issued_at = 5;
}

// Consumed by ReadCellValue to fetch the full (un-truncated) value of a
// single cell. Decoded form of TableCell.full_value_token.
message TableCellFullValueTokenPayload {
  uint32 version = 1;
  string table_name = 2;
  string column = 3;

  RowIdentity row_identity = 4;
  repeated TableValue identity_values = 5;

  // Server enforces a 5-minute TTL.
  google.protobuf.Timestamp issued_at = 6;
}
