syntax = "proto3";

package querylane.console.v1alpha1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "google/rpc/status.proto";

// --------------------------------------------------------------------------
// Service
// --------------------------------------------------------------------------

// Service for managing databases within registered Instances.
// This service provides access to database metadata for building
// visual database browsers and workspace tools.
service DatabaseService {
  // Lists databases available in a given Instance.
  // Returns databases that the Instance has access to, excluding system
  // databases by default.
  rpc ListDatabases(ListDatabasesRequest) returns (ListDatabasesResponse) {}

  // Gets the details of a specific Database.
  rpc GetDatabase(GetDatabaseRequest) returns (GetDatabaseResponse) {}

  // Returns live query optimization signals for a Database.
  rpc GetDatabaseQueryInsights(GetDatabaseQueryInsightsRequest) returns (GetDatabaseQueryInsightsResponse) {}
}

// --------------------------------------------------------------------------
// Resource Messages
// --------------------------------------------------------------------------

// A Database represents a logical container for schemas and tables within an
// Instance. This resource reflects the current state of the external database system.
message Database {
  option (google.api.resource) = {
    type: "console.querylane.dev/Database"
    pattern: "instances/{instance}/databases/{database}"
    plural: "databases"
    singular: "database"
  };

  // Output-only identifier. The unique resource name of the database.
  // Format: instances/{instance}/databases/{database}
  string name = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_behavior) = IDENTIFIER
  ];

  // Output-only. The display name of the database for UI presentation.
  string display_name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. The default character set of the database.
  string character_set = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. The default collation of the database.
  string collation = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. The PostgreSQL role that owns this database.
  string owner = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. The last time a DDL operation was performed on this database.
  google.protobuf.Timestamp last_ddl_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. Whether this is a system database that should typically
  // be hidden from end users (e.g., template0, template1, postgres).
  bool is_system_database = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output-only. The time when the database was created.
  google.protobuf.Timestamp create_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// --------------------------------------------------------------------------
// RPC request/response messages
// --------------------------------------------------------------------------

// --- ListDatabases RPC ---

message ListDatabasesRequest {
  // Required. The parent Instance from which to list databases.
  // Format: instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "console.querylane.dev/Instance"},
    (buf.validate.field).string.pattern = "^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?$"
  ];

  // Optional. The maximum number of databases to return. Server may return fewer.
  // If unspecified or 0, server will choose a reasonable default (typically 50).
  // Maximum value is 1000.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A page token received from a previous `ListDatabases` call.
  // Provide this to retrieve the next page of results.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Filter expression (an AIP-160 subset: `=`, `!=`, the `:`
  // case-insensitive substring operator, combined with `AND`). Values are
  // quoted strings or the bare bools true/false. Filterable fields:
  //   - name, owner (string; support the `:` substring operator)
  //   - is_system_database (bool)
  // Examples:
  //   - is_system_database = false (exclude system databases)
  //   - owner = "postgres"
  //   - name:"test"
  //   - owner = "postgres" AND is_system_database = false
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Ordering expression following AIP-132 syntax.
  // Supported fields: name, owner, last_ddl_time, create_time
  // Default: "name asc"
  //
  // Examples:
  //   - "name asc"
  //   - "last_ddl_time desc, name asc"
  //   - "create_time desc"
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

message ListDatabasesResponse {
  // The list of databases found in the instance.
  repeated Database databases = 1;

  // A token to retrieve the next page of results.
  // If this field is empty, there are no subsequent pages.
  string next_page_token = 2;
}

// --- GetDatabase RPC ---

message GetDatabaseRequest {
  // Required. The name of the database to retrieve.
  // Format: instances/{instance}/databases/{database}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (google.api.resource_reference) = {type: "console.querylane.dev/Database"},
    (buf.validate.field).string.pattern = "^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?/databases/[^/]+$"
  ];
}

message GetDatabaseResponse {
  // The retrieved database resource.
  Database database = 1;
}

// --- GetDatabaseQueryInsights RPC ---

message GetDatabaseQueryInsightsRequest {
  // Required. The name of the database to inspect.
  // Format: instances/{instance}/databases/{database}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (google.api.resource_reference) = {type: "console.querylane.dev/Database"},
    (buf.validate.field).string.pattern = "^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?/databases/[^/]+$"
  ];
}

message GetDatabaseQueryInsightsResponse {
  // Live query optimization signals for the database.
  DatabaseQueryInsights query_insights = 1 [(buf.validate.field).required = true];

  // Errors encountered fetching individual insight categories.
  // The RPC succeeds even when some categories are unavailable. Each Status
  // identifies the failed category via google.rpc.ErrorInfo with metadata key
  // "metric" set to "query_stats" or "table_stats".
  repeated google.rpc.Status partial_errors = 2 [(buf.validate.field).repeated.max_items = 2];
}

// Live query optimization signals for a PostgreSQL database. Statistics are
// cumulative since PostgreSQL last reset the underlying stats views.
message DatabaseQueryInsights {
  option (buf.validate.message).cel = {
    id: "top_queries_empty_when_unavailable"
    message: "top_queries must be empty when query stats are unavailable"
    expression: "this.query_stats_available || this.top_queries.size() == 0"
  };
  option (buf.validate.message).cel = {
    id: "table_insights_empty_when_unavailable"
    message: "table insights must be empty when table stats are unavailable"
    expression: "this.table_stats_available || (this.sequential_scan_hotspots.size() == 0 && this.table_cache_hits.size() == 0)"
  };

  // Top pg_stat_statements entries by total execution time.
  repeated QueryRuntimeInsight top_queries = 1 [(buf.validate.field).repeated.max_items = 10];

  // Tables with sequential read pressure from pg_stat_user_tables.
  repeated SequentialScanHotspot sequential_scan_hotspots = 2 [(buf.validate.field).repeated.max_items = 10];

  // Table-level heap block cache hit ratios from pg_statio_user_tables.
  repeated TableCacheHitInsight table_cache_hits = 3 [(buf.validate.field).repeated.max_items = 10];

  // Timestamp when the metrics were observed.
  google.protobuf.Timestamp observed_at = 4 [(buf.validate.field).required = true];

  // Whether pg_stat_statements could be queried.
  bool query_stats_available = 5;

  // Whether table statistics views could be queried.
  bool table_stats_available = 6;
}

message QueryRuntimeInsight {
  // Bounded, redacted SQL preview for display. Empty when PostgreSQL does not
  // expose representative text for this statement.
  string query = 1;

  // Number of calls since stats reset.
  int64 calls = 2 [(buf.validate.field).int64.gt = 0];

  // Total execution time in milliseconds since stats reset.
  double total_time_ms = 3 [(buf.validate.field).double.gte = 0];

  // Mean execution time in milliseconds.
  double mean_time_ms = 4 [(buf.validate.field).double.gte = 0];

  // Ratio to the slowest query returned in this response.
  double total_time_ratio = 5 [(buf.validate.field).double = {
    gte: 0
    lte: 1
  }];

  // PostgreSQL pg_stat_statements queryid when available.
  int64 query_id = 6;
}

message SequentialScanHotspot {
  option (buf.validate.message).cel = {
    id: "sequential_scan_ratio_zero_when_no_scans"
    message: "sequential_scan_ratio must be zero when no scans were observed"
    expression: "this.sequential_scans > 0 || this.index_scans > 0 || this.sequential_scan_ratio == 0.0"
  };

  // Schema containing the table.
  string schema_name = 1 [(buf.validate.field).string.min_len = 1];

  // Table name.
  string table_name = 2 [(buf.validate.field).string.min_len = 1];

  // Sequential scan count since stats reset.
  int64 sequential_scans = 3 [(buf.validate.field).int64.gte = 0];

  // Tuples read by sequential scans since stats reset.
  int64 sequential_tuples_read = 4 [(buf.validate.field).int64.gte = 0];

  // Index scan count since stats reset.
  int64 index_scans = 5 [(buf.validate.field).int64.gte = 0];

  // Estimated live row count from pg_stat_user_tables.
  int64 estimated_live_rows = 6 [(buf.validate.field).int64.gte = 0];

  // Total table size in bytes.
  int64 total_size_bytes = 7 [(buf.validate.field).int64.gte = 0];

  // Sequential scans divided by sequential plus index scans.
  double sequential_scan_ratio = 8 [(buf.validate.field).double = {
    gte: 0
    lte: 1
  }];
}

message TableCacheHitInsight {
  option (buf.validate.message).cel = {
    id: "cache_hit_empty_ratio_zero"
    message: "hit_ratio must be zero when no heap blocks were observed"
    expression: "this.heap_blocks_hit > 0 || this.heap_blocks_read > 0 || this.hit_ratio == 0.0"
  };

  // Schema containing the table.
  string schema_name = 1 [(buf.validate.field).string.min_len = 1];

  // Table name.
  string table_name = 2 [(buf.validate.field).string.min_len = 1];

  // Heap blocks served from shared buffers since stats reset.
  int64 heap_blocks_hit = 3 [(buf.validate.field).int64.gte = 0];

  // Heap blocks read from disk since stats reset.
  int64 heap_blocks_read = 4 [(buf.validate.field).int64.gte = 0];

  // Heap cache hit ratio. Values below 0.9 are warning-worthy in the UI.
  double hit_ratio = 5 [(buf.validate.field).double = {
    gte: 0
    lte: 1
  }];

  // Total table size in bytes.
  int64 total_size_bytes = 6 [(buf.validate.field).int64.gte = 0];
}
