  // Format: instances/{instance}/databases/{database}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (google.api.resource_reference) = {type: "console.querylane.dev/Database"},
    (buf.validate.field).string.pattern = "^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?/databases/[^/]+$"
  ];

  // Optional. The maximum number of grants to return. Server may return fewer.
  // If unspecified or 0, server will choose a reasonable default (typically 50).
  // Maximum value is 1000.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A page token received from a previous `ListPublicGrants` call.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Filter expression (an AIP-160 subset: `=`, `!=`, the `:`
  // case-insensitive substring operator, combined with `AND`). Values are
  // quoted strings. Filterable fields:
  //   - object_type (`=`/`!=` only, no `:` substring): one of DATABASE, SCHEMA, TABLE, VIEW,
  //     MATERIALIZED_VIEW, SEQUENCE, FOREIGN_TABLE, FUNCTION, LARGE_OBJECT
  //   - object_name, schema_name, privilege, grantor (string; support the
  //     `:` substring operator)
  // Examples:
  //   - privilege = "CONNECT"
  //   - object_type = "TABLE" AND object_name:"orders"
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Ordering expression following AIP-132 syntax.
  // Supported fields: schema_name, object_name, privilege
  // Default: "schema_name asc, object_name asc, privilege asc"
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

message ListPublicGrantsResponse {
  // The list of privileges granted to PUBLIC in the database.
  repeated ObjectGrant grants = 1;

  // A token to retrieve the next page of results.
  // If this field is empty, there are no subsequent pages.
  string next_page_token = 2;
}
