syntax = "proto3";

package querylane.console.v1alpha1;

// ErrorReason defines the supported machine-readable error reasons used to
// construct the `google.rpc.ErrorInfo.reason` string.
enum ErrorReason {
  // Do not use this default value.
  ERROR_REASON_UNSPECIFIED = 0;

  // --- Common Reasons ---

  // The specified resource could not be found.
  RESOURCE_NOT_FOUND = 1;

  // A resource that a client tried to create already exists.
  RESOURCE_ALREADY_EXISTS = 2;

  // The input provided with the request is invalid.
  INVALID_ARGUMENT = 3;

  // The request cannot be completed due to an internal server error.
  INTERNAL_ERROR = 7;

  // The request timed out.
  TIMEOUT = 9;

  // The system is not in a state where the request can be fulfilled.
  FAILED_PRECONDITION = 10;

  // The caller must authenticate before retrying.
  UNAUTHENTICATED = 11;

  // The caller is authenticated but not authorized for this operation.
  PERMISSION_DENIED = 12;

  // The application database is not configured yet.
  APP_DATABASE_NOT_CONFIGURED = 101;

  // The application database is temporarily unavailable.
  APP_DATABASE_UNAVAILABLE = 102;

  // Querylane's live-query admission limit is currently saturated.
  LIVE_QUERY_LIMIT_EXCEEDED = 103;

  // The caller exceeded the managed PostgreSQL connection-test rate.
  CONNECTION_TEST_RATE_LIMIT_EXCEEDED = 104;
}

// PostgreSqlErrorKind identifies the transport-neutral PostgreSQL error
// category selected by the backend.
enum PostgreSqlErrorKind {
  // The backend did not provide a recognized PostgreSQL error category.
  POSTGRESQL_ERROR_KIND_UNSPECIFIED = 0;

  POSTGRESQL_ERROR_KIND_INVALID_ARGUMENT = 1;
  POSTGRESQL_ERROR_KIND_FAILED_PRECONDITION = 2;
  POSTGRESQL_ERROR_KIND_NOT_FOUND = 3;
  POSTGRESQL_ERROR_KIND_ALREADY_EXISTS = 4;
  POSTGRESQL_ERROR_KIND_PERMISSION_DENIED = 5;
  POSTGRESQL_ERROR_KIND_UNAUTHENTICATED = 6;
  POSTGRESQL_ERROR_KIND_ABORTED = 7;
  POSTGRESQL_ERROR_KIND_TIMEOUT = 8;
  POSTGRESQL_ERROR_KIND_UNAVAILABLE = 9;
  POSTGRESQL_ERROR_KIND_RESOURCE_EXHAUSTED = 10;
  POSTGRESQL_ERROR_KIND_UNIMPLEMENTED = 11;
  POSTGRESQL_ERROR_KIND_INTERNAL = 12;
}

// PostgreSqlErrorRetryGuidance tells clients when a manual retry may be useful.
// It is advisory and never requests an automatic retry.
enum PostgreSqlErrorRetryGuidance {
  // The backend did not provide retry guidance.
  POSTGRESQL_ERROR_RETRY_GUIDANCE_UNSPECIFIED = 0;

  // Retry only after correcting the request or PostgreSQL state.
  POSTGRESQL_ERROR_RETRY_GUIDANCE_AFTER_CORRECTION = 1;

  // The same request may be retried immediately.
  POSTGRESQL_ERROR_RETRY_GUIDANCE_IMMEDIATELY = 2;

  // Retry later, after the transient condition may have cleared.
  POSTGRESQL_ERROR_RETRY_GUIDANCE_LATER = 3;
}

// PostgreSqlErrorDetail carries PostgreSQL SQLSTATE metadata for Connect error
// clients. For user-managed instances, server_fields can contain bounded,
// untrusted message, detail, hint, severity, position, schema_name, table_name,
// column_name, data_type_name, and constraint_name values. Clients must render
// these as text and must not copy them into telemetry. Querylane's meta database
// never exposes server_fields. Internal query context and PostgreSQL source
// fields are always excluded.
message PostgreSqlErrorDetail {
  // The five-character SQLSTATE code, for example "23505".
  string sqlstate = 1;

  // The two-character SQLSTATE class, for example "23".
  string sqlstate_class = 2;

  // The documented PostgreSQL condition name when known, for example
  // "unique_violation". Unknown classes leave this empty.
  string condition_name = 3;

  // The backend operation that was running when PostgreSQL returned the error.
  string operation = 4;

  // Bounded server fields approved for the current database trust boundary.
  map<string, string> server_fields = 5;

  // The backend-owned PostgreSQL error category.
  PostgreSqlErrorKind kind = 6;

  // Advisory guidance for a user-initiated retry.
  PostgreSqlErrorRetryGuidance retry_guidance = 7;
}
