# === Docker image pipeline ================================================
#   _docker-build.yml   reusable engine: multi-arch build (+ optional push)
#   docker-ci.yml       on PR         -> build both arches, no push (validate)
#   docker-publish.yml  on push main  -> querylane-dev : edge + sha-<sha>
#   release.yml         on release    -> querylane     : <version> + latest
# Two channels = two packages: the stable `querylane` history stays curated
# to real releases; all dev churn lands in `querylane-dev`.
# ==========================================================================
name: _docker-build

# Reusable workflow: builds the production image and (optionally) pushes it to
# GHCR as a multi-arch (linux/amd64 + linux/arm64) manifest. Both arches are
# cross-compiled from the amd64 runner via BuildKit's TARGETARCH, so there is no
# QEMU emulation — a single fast, reliable job produces both variants.

on:
  workflow_call:
    inputs:
      image:
        description: "Target image, e.g. ghcr.io/owner/repo (stable) or .../repo-dev (edge channel)."
        type: string
        required: true
      version:
        description: "Release version to tag (e.g. 1.2.3). Empty => rolling edge build."
        type: string
        default: ""
      push:
        description: "Push to GHCR. False builds only (validation)."
        type: boolean
        default: true
      dockerfile:
        description: "Dockerfile to build."
        type: string
        default: "./Dockerfile"
      rolling_tag:
        description: "Rolling tag used when version is empty."
        type: string
        default: "edge"
      sha_prefix:
        description: "Prefix for immutable commit tags."
        type: string
        default: "sha-"
      cache_scope:
        description: "GitHub Actions build-cache scope."
        type: string
        default: "querylane-publish"

env:
  IMAGE: ${{ inputs.image }}
  PLATFORMS: linux/amd64,linux/arm64

# Permissions are granted by each caller (a reusable workflow may not request
# more than its caller's token allows). Publish callers grant `packages: write`;
# the PR validator grants only `contents: read` and never logs in / pushes.

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.IMAGE }}
          # Rolling `edge` + immutable `sha-<sha>` for main builds; the exact
          # `<version>` + rolling `latest` for releases.
          tags: |
            type=raw,value=${{ inputs.rolling_tag }},enable=${{ inputs.version == '' }}
            type=sha,prefix=${{ inputs.sha_prefix }},enable=${{ inputs.version == '' }}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Supply-chain attestations for the public image. BuildKit-native, so
          # they need only `packages: write` (no id-token) and add negligible
          # time for a distroless single-binary image. Skipped for PR validation.
          provenance: ${{ inputs.push && 'mode=max' || 'false' }}
          sbom: ${{ inputs.push }}
          cache-from: type=gha,scope=${{ inputs.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache_scope }},ignore-error=true
