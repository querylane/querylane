name: Release

on:
  push:
    branches: [main]

env:
  ACTION_CHECKOUT: &action_checkout actions/checkout@v7.0.0
  ACTION_SETUP_BUN: &action_setup_bun oven-sh/setup-bun@v2.2.0
  ACTION_SETUP_NODE: &action_setup_node actions/setup-node@v6.4.0
  ACTION_CHANGESETS: &action_changesets changesets/action@v2.0.0-next.3
  BUN_VERSION: &bun_version 1.3.14
  NODE_VERSION: &node_version 24

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.image-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: *action_checkout
        with:
          # Changesets needs persisted credentials to create/update release PRs and tags.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: *action_setup_bun
        with:
          bun-version: *bun_version

      - name: Setup Node.js
        uses: *action_setup_node
        with:
          node-version: *node_version

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Expose frontend changesets at repository root
        id: changeset-dir
        shell: bash
        run: |
          set -euo pipefail
          if [ -d .changeset ]; then
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -d frontend/.changeset ]; then
            ln -s frontend/.changeset .changeset
            echo "skip_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No frontend/.changeset directory found. Skipping release workflow."
          echo "skip_release=true" >> "$GITHUB_OUTPUT"

      - name: Create Release PR or Publish GitHub Release
        if: steps.changeset-dir.outputs.skip_release != 'true'
        id: changesets
        uses: *action_changesets
        with:
          version-script: bun run --cwd frontend changeset:version
          publish-script: bash .github/scripts/changeset-tag-output.sh
          create-github-releases: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Resolve published image version
        id: image-version
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          version="$(printf '%s' "$PUBLISHED_PACKAGES" | jq -r '.[0].version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  publish-image:
    name: Publish Docker image
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-build-push.yml
    with:
      version: ${{ needs.release.outputs.version }}
      push: true
