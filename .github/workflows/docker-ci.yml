# === Docker image pipeline ================================================
#   _docker-build.yml   reusable engine: multi-arch build (+ optional push)
#   docker-ci.yml       on PR         -> build both arches, no push (validate)
#   docker-publish.yml  on push main  -> querylane-dev : edge + sha-<sha>
#   release.yml         on release    -> querylane     : <version> + latest
# ==========================================================================
name: docker-ci

# On PRs: build the production image (both arches, no push) to catch build
# breakage before merge. Uses the same reusable workflow as publishing, so the
# build definition never drifts between validation and release.
#
# Runs on EVERY PR (no `paths:` filter) on purpose: the image bundles both
# frontend/ (bun build, embedded) and backend/ (go build), so almost any source
# change can break it. A path filter here silently rotted once (frontend/** was
# missing); always-run is correct-by-construction and stays cheap via the GHA
# build cache. Don't re-add a paths filter.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    if: github.event.pull_request.draft != true
    uses: ./.github/workflows/_docker-build.yml
    with:
      # Not pushed, so the name is cosmetic; mirror the dev channel for clarity.
      image: ghcr.io/${{ github.repository }}-dev
      push: false
