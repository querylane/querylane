name: docker-ci

# On PRs: build the production image (both arches, no push) to catch Dockerfile
# breakage before merge. Uses the same reusable workflow as publishing, so the
# build definition never drifts between validation and release.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - Dockerfile
      - .dockerignore
      - Taskfile.yaml
      - backend/**
      - taskfiles/dev.yaml
      - taskfiles/docker.yaml
      - .github/workflows/docker-ci.yml
      - .github/workflows/docker-build-push.yml

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    if: github.event.pull_request.draft != true
    uses: ./.github/workflows/docker-build-push.yml
    with:
      push: false
