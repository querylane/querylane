# === Docker image pipeline ================================================
#   _docker-build.yml   reusable engine: multi-arch build (+ optional push)
#   docker-ci.yml       on PR         -> build both arches, no push (validate)
#   docker-publish.yml  on push main  -> querylane-dev : edge + sha-<sha>
#   release.yml         on release    -> querylane     : <version> + latest
# ==========================================================================
name: docker-publish

# Publishes a rolling `edge` (+ `sha-<sha>`) multi-arch image to the dev channel
# package `ghcr.io/<owner>/<repo>-dev` on every push to main. Versioned
# `latest`/`<version>` images go to the stable `<repo>` package from Release.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: ./.github/workflows/_docker-build.yml
    with:
      image: ghcr.io/${{ github.repository }}-dev
      version: ""
      push: true

  publish-docs:
    uses: ./.github/workflows/_docker-build.yml
    with:
      image: ghcr.io/${{ github.repository }}-dev
      version: ""
      push: true
      dockerfile: ./Dockerfile.docs
      rolling_tag: docs-edge
      sha_prefix: docs-sha-
      cache_scope: querylane-docs-publish
