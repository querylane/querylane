name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      # Claude OIDC validation requires this workflow to match the default branch.
      - ".github/workflows/claude-code-review.yml"
      - ".github/workflows/claude.yml"
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    if: github.event.pull_request.draft != true
    timeout-minutes: 15
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          # The plugin's git-blame agent needs full history for context.
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*)"
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      # The action exits 0 even when Claude's own run fails (e.g. an expired
      # CLAUDE_CODE_OAUTH_TOKEN or an account usage limit), so a dead review
      # looks identical to a clean one. Inspect the execution log and fail the
      # job when Claude reported an error so the broken state is visible.
      - name: Verify Claude review succeeded
        if: always() && steps.claude-review.outcome == 'success'
        env:
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          if [ -z "$EXECUTION_FILE" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "::error::Claude execution log missing — the review did not run. Check the CLAUDE_CODE_OAUTH_TOKEN secret."
            exit 1
          fi
          # Handles both a single JSON array and newline-delimited JSON events.
          is_error=$(jq -s -r 'flatten | map(select(.type == "result")) | last | .is_error' "$EXECUTION_FILE" 2>/dev/null || echo parse_error)
          if [ "$is_error" != "false" ]; then
            echo "::error::Claude Code review reported an error (is_error=$is_error); no review was posted. Likely an expired/invalid CLAUDE_CODE_OAUTH_TOKEN or an account usage limit."
            exit 1
          fi
          echo "Claude review completed successfully."
