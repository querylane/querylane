version: "2"
run:
  allow-parallel-runners: true
linters:
  default: all
  disable:
    - cyclop # covered by gocyclo
    - depguard # we don't maintain a guard list yet, may be added later
    - exhaustruct # not always desired, can clutter code a lot
    - funlen  # rely on code review to limit function length
    - gochecknoglobals
    - gocognit # dubious "cognitive overhead" quantification
    - inamedparam # convention is not followed
    - ireturn # don't think it's an idiomatic practice
    - lll # don't want hard limits for line length
    - maintidx # covered by gocyclo
    - mnd # status codes are clearer than constants
    - nlreturn # overly opinionated to enforce empty lines before return
    - noinlineerr # inline errors are sometimes more readible and reduce the scope
    - protogetter # too many false positives
    - testpackage # internal tests are fine
    - unqueryvet # we intentionally use AllColumns; explicit column lists add maintenance burden without benefit
    - varnamelen # oftentimes short varnames are fine
    - wrapcheck # we don't always have to wrap errors
    - wsl # too much enforced whitespace
  settings:
    errcheck:
      check-type-assertions: true
    forbidigo:
      forbid:
        - pattern: ^fmt\.Print
        - pattern: ^log\.
        - pattern: ^print$
        - pattern: ^println$
        - pattern: ^panic$
    godox:
      keywords:
        - FIXME
    goconst:
      min-occurrences: 4 # 3 is too aggressive for column name strings in cursor extractors
    dupl:
      threshold: 200
    interfacebloat:
      max: 15
    importas:
      no-unaliased: true
    varnamelen:
      ignore-decls:
        - T any
        - i int
        - wg sync.WaitGroup
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)\.go$
        text: 'do not define dynamic errors, use wrapped static errors instead: .*'
      - linters:
          - gosec
        path: _test\.go$ # test files legitimately contain hardcoded credentials, unsafe conversions, etc.
      - linters:
          - revive
        path: storage/types/ # package name "types" is intentional; it houses storage-layer type helpers
        text: 'var-naming: avoid meaningless package names'
    paths:
      - protogen
issues:
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - localmodule
