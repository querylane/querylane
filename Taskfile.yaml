version: 3

dotenv: ['.env.local', '.env']

vars:
  BUILD_ROOT: "{{ .ROOT_DIR }}/.build"
  GO_BUILD_ROOT: '{{.BUILD_ROOT}}/go/{{.GO_VERSION}}'
  BACKEND_ROOT: "{{ .ROOT_DIR }}/backend"
  FRONTEND_ROOT: "{{ .ROOT_DIR }}/frontend"
  POSTGRES_DSN: "postgres://root:pass@localhost:5432/dev?sslmode=disable"
  PATH_PREFIX: PATH={{.BUILD_ROOT}}/bin:{{.GO_BUILD_ROOT}}/bin:{{.BUILD_ROOT}}/bin/go:$PATH GOBIN={{ .BUILD_ROOT }}/bin/go GOROOT=
  BRANCH_SLUG:
    sh: git rev-parse --abbrev-ref HEAD | sed -e 's/[^[:alnum:]]/-/g' | tr -s '-' | tr A-Z a-z

includes:
  backend: taskfiles/backend.yaml
  docker: taskfiles/docker.yaml
  proto: taskfiles/proto.yaml
  install: taskfiles/install.yaml
  sql: taskfiles/sql.yaml
  dev: taskfiles/dev.yaml

tasks:
  setup:
    desc: Set up the repository for development (install tools + git hooks)
    deps:
      - install:golangci-lint
      - install:goimports
      - install:gofumpt
      - install:gci
    dir: "{{.BACKEND_ROOT}}"
    cmds:
      - go tool lefthook install
      - echo "Setup complete! Git hooks are installed."

  dev:
    desc: Start full development environment (Database + Backend + Frontend)
    cmds:
      - task: dev:dev
