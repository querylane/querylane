      additionalProperties: false
    querylane.console.v1alpha1.MetricId:
      type: string
      title: MetricId
      enum:
        - METRIC_ID_UNSPECIFIED
        - METRIC_ID_CONNECTIONS_ACTIVE
        - METRIC_ID_CONNECTIONS_IDLE
        - METRIC_ID_CONNECTIONS_TOTAL
        - METRIC_ID_CONNECTIONS_MAX
        - METRIC_ID_TRANSACTIONS_PER_SECOND
        - METRIC_ID_CACHE_HIT_RATIO
        - METRIC_ID_STORAGE_TOTAL_BYTES
        - METRIC_ID_IO_READ_BYTES_PER_SECOND
        - METRIC_ID_IO_WRITE_BYTES_PER_SECOND
        - METRIC_ID_DATABASE_SIZE_BYTES
        - METRIC_ID_DATABASE_LIVE_TUPLES
        - METRIC_ID_DATABASE_DEAD_TUPLES
      description: |-
        MetricId enumerates the queryable series. The Go series registry
         (backend/metricstore) is the source of truth; this enum mirrors it. Values
         are grouped by scope: the target must be an instance for instance-scoped
         metrics and a database for database-scoped metrics.
    querylane.console.v1alpha1.MetricKind:
      type: string
      title: MetricKind
      enum:
        - METRIC_KIND_UNSPECIFIED
        - METRIC_KIND_GAUGE
        - METRIC_KIND_COUNTER_RATE
        - METRIC_KIND_RATIO
      description: MetricKind classifies a series' read-side treatment.
    querylane.console.v1alpha1.MetricSeries:
      type: object
      properties:
        metric:
          title: metric
          description: Which requested metric this series belongs to.
          $ref: '#/components/schemas/querylane.console.v1alpha1.MetricId'
        labels:
          type: object
          title: labels
          additionalProperties:
            type: string
            title: value
          description: |-
            Series identity for breakdowns (e.g. `{"state": "active"}`). Empty in the
             current version; reserved for future tag-based breakdowns such as
             connections by application.
        unit:
          title: unit
          description: How to format the values (bytes, ratio, per-second, ...).
          $ref: '#/components/schemas/querylane.console.v1alpha1.MetricUnit'
        kind:
          title: kind
          description: |-
            Whether the underlying samples are a gauge, a rate derived from a
             cumulative counter, or a ratio. Lets the client label axes appropriately.
          $ref: '#/components/schemas/querylane.console.v1alpha1.MetricKind'
        points:
          title: points
          description: The bucketed values for the requested window.
          $ref: '#/components/schemas/querylane.console.v1alpha1.Points'
        delta:
          title: delta
          description: |-
            Present only when the request set `comparison`. The scalar trend used for
             stat tiles like "2,841 tps · +62% · 24h".
          $ref: '#/components/schemas/querylane.console.v1alpha1.TrendDelta'
      title: MetricSeries
      additionalProperties: false
    querylane.console.v1alpha1.MetricSeries.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    querylane.console.v1alpha1.MetricUnit:
      type: string
      title: MetricUnit
      enum:
        - METRIC_UNIT_UNSPECIFIED
        - METRIC_UNIT_COUNT
        - METRIC_UNIT_BYTES
        - METRIC_UNIT_RATIO
        - METRIC_UNIT_PER_SECOND
        - METRIC_UNIT_BYTES_PER_SECOND
      description: MetricUnit is a formatting hint for the client.
    querylane.console.v1alpha1.ObjectGrant:
      type: object
      properties:
        objectType:
          title: object_type
          description: Output-only. The kind of object the privilege applies to.
          $ref: '#/components/schemas/querylane.console.v1alpha1.GrantObjectType'
        schemaName:
          type: string
          title: schema_name
          description: |-
            Output-only. The schema containing the object. Empty for DATABASE grants;
             for SCHEMA grants this is the schema itself.
        objectName:
          type: string
          title: object_name
          description: |-
            Output-only. The bare object name (relation or sequence name; the database
             name for DATABASE grants). Empty for SCHEMA grants, where the target is the
             schema named by `schema_name`.
        privilege:
          type: string
          title: privilege
          description: Output-only. The PostgreSQL privilege keyword (e.g. "SELECT", "USAGE").
        withGrantOption:
          type: boolean
          title: with_grant_option
          description: |-
            Output-only. Whether the role may grant this privilege to others
             (WITH GRANT OPTION).
        grantor:
          type: string
          title: grantor
          description: |-
            Output-only. The exact PostgreSQL role name that granted the privilege.
             Empty when the grantor is unknown.
      title: ObjectGrant
      additionalProperties: false
      description: |-
        A single object-level privilege grant within a database, derived from catalog
         ACLs. This is a computed value (no resource name). The grantee is implied by
         the RPC that returns it: ListRoleGrants returns privileges held directly by a
         specific role, while ListPublicGrants returns privileges held by PUBLIC.
         Owner-implicit privileges and membership inheritance are never reported here.
    querylane.console.v1alpha1.OwnedObject:
      type: object
      properties:
        objectType:
          title: object_type
          description: |-
            Output-only. The kind of object owned. DATABASE represents ownership of the
             connected database itself (pg_database.datdba); all other types are objects
             within that database.
          $ref: '#/components/schemas/querylane.console.v1alpha1.GrantObjectType'
        schemaName:
          type: string
          title: schema_name
          description: |-
            Output-only. The schema containing the object. For SCHEMA objects this is
             the schema itself. Empty for DATABASE.
        objectName:
          type: string
          title: object_name
          description: |-
            Output-only. The bare object name (the database name for DATABASE). Empty
             for SCHEMA objects, where the target is the schema named by `schema_name`.
             For functions this includes the identity arguments to disambiguate
             overloads.
      title: OwnedObject
      additionalProperties: false
      description: |-
        An object owned by a role within a database. Owners implicitly hold every
         privilege on the objects they own, so these are not reported by
         ListRoleGrants. Computed from pg_class/pg_namespace/pg_proc owner columns.
    querylane.console.v1alpha1.PaginationStrategy:
      type: string
      title: PaginationStrategy
      enum:
        - PAGINATION_STRATEGY_UNSPECIFIED
        - PAGINATION_STRATEGY_KEYSET
        - PAGINATION_STRATEGY_UNSTABLE_KEYSET
        - PAGINATION_STRATEGY_OFFSET
      description: |-
        Describes how the current page was actually paged. Independent of how
         rows are identified (RowIdentity).
    querylane.console.v1alpha1.PgStatStatementsHealth:
      type: object
      properties:
        status:
          title: status
          $ref: '#/components/schemas/querylane.console.v1alpha1.HealthCheckStatus'
        summary:
          type: string
          title: summary
        extensionInstalled:
          type: boolean
          title: extension_installed
        extensionSchema:
          type: string
          title: extension_schema
        extensionVersion:
          type: string
          title: extension_version
        sharedPreloadConfigured:
          type: boolean
          title: shared_preload_configured
        trackMode:
          type: string
          title: track_mode
        viewQueryable:
          type: boolean
          title: view_queryable
        statementCount:
          type:
            - integer
            - string
          title: statement_count
          minimum: 0
          format: int64
        statsResetAt:
          title: stats_reset_at
          type: string
          format: date-time
      title: PgStatStatementsHealth
      additionalProperties: false
      description: |-
        pg_stat_statements health from pg_extension, PostgreSQL settings, and the
         pg_stat_statements views when installed.
    querylane.console.v1alpha1.Points:
      type: object
      properties:
        startTime:
          title: start_time
          description: The timestamp of `values[0]`.
          type: string
          format: date-time
        step:
          title: step
          description: |-
            The spacing between consecutive values. At least QueryMetricsResponse.step;
             coarser when this metric's probe cadence is coarser than the finest series.
          type: string
          format: duration
        values:
          type: array
          items:
            type: number
            format: double
          title: values
          description: The bucketed values. NaN marks a bucket with no samples.
      title: Points
      additionalProperties: false
      description: |-
        Points is a columnar, step-implicit series: `values[i]` is the value at
         `start_time + i*step`. This avoids a timestamp per point, which is pure
         redundancy on a regular grid. A gap (no samples in a bucket) is encoded as
         NaN so charting libraries break the line there natively.
    querylane.console.v1alpha1.PolicyCommand:
      type: string
      title: PolicyCommand
      enum:
        - POLICY_COMMAND_UNSPECIFIED
        - POLICY_COMMAND_ALL
        - POLICY_COMMAND_SELECT
        - POLICY_COMMAND_INSERT
        - POLICY_COMMAND_UPDATE
        - POLICY_COMMAND_DELETE
    querylane.console.v1alpha1.PolicyMode:
      type: string
      title: PolicyMode
      enum:
        - POLICY_MODE_UNSPECIFIED
        - POLICY_MODE_PERMISSIVE
        - POLICY_MODE_RESTRICTIVE
    querylane.console.v1alpha1.PostgresConfig:
      type: object
      properties:
        host:
          type: string
          title: host
          minLength: 1
          description: Required. The hostname or IP address of the PostgreSQL server.
        port:
          type: integer
          title: port
          maximum: 65535
          minimum: 1
          format: int32
          description: Required. The port number of the PostgreSQL server.
        database:
          type: string
          title: database
          minLength: 1
          description: Required. The name of the database to connect to.
        username:
          type: string
          title: username
          minLength: 1
          description: Required. The username to authenticate with.
        password:
          type: string
          title: password
          minLength: 1
          description: |-
            Input-only. Legacy inline password field. New clients should use
             password_source.inline instead. Inline values are encrypted at rest.
        sslMode:
          title: ssl_mode
          description: Optional. The SSL mode to use for the connection.
          $ref: '#/components/schemas/querylane.console.v1alpha1.PostgresConfig.SslMode'
        passwordSource:
          title: password_source
          description: |-
            Optional. Source for the password secret. When omitted, the legacy
             `password` field is used for backward compatibility.
          $ref: '#/components/schemas/querylane.console.v1alpha1.SecretSource'
        sslNegotiation:
          title: ssl_negotiation
          description: |-
            Optional. How SSL encryption is negotiated with the server when SSL is
             used. `direct` maps to the libpq `sslnegotiation=direct` connection option
             and requires ssl_mode `require`, `verify-ca`, or `verify-full`.
          $ref: '#/components/schemas/querylane.console.v1alpha1.PostgresConfig.SslNegotiation'
      title: PostgresConfig
      additionalProperties: false
      description: |
        postgres_config_direct_ssl_negotiation_requires_tls // ssl_negotiation direct requires ssl_mode require, verify-ca, or verify-full
    querylane.console.v1alpha1.PostgresConfig.SslMode:
      type: string
      title: SslMode
      enum:
        - SSL_MODE_UNSPECIFIED
        - SSL_MODE_DISABLED
        - SSL_MODE_ALLOW
        - SSL_MODE_PREFER
        - SSL_MODE_REQUIRE
        - SSL_MODE_VERIFY_CA
        - SSL_MODE_VERIFY_FULL
    querylane.console.v1alpha1.PostgresConfig.SslNegotiation:
      type: string
      title: SslNegotiation
      enum:
        - SSL_NEGOTIATION_UNSPECIFIED
        - SSL_NEGOTIATION_POSTGRES
        - SSL_NEGOTIATION_DIRECT
    querylane.console.v1alpha1.QueryColumnMetadata:
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.TableResultColumn'
          title: columns
      title: QueryColumnMetadata
      additionalProperties: false
      description: QueryColumnMetadata is the first message in an ExecuteQuery stream.
    querylane.console.v1alpha1.QueryMetricsRequest:
      type: object
      properties:
        target:
          type: string
          title: target
          minLength: 1
          description: |-
            Required. The resource whose metrics to query, as an AIP resource name:
             `instances/{instance}` for instance-scoped metrics or
             `instances/{instance}/databases/{database}` for database-scoped metrics.
             Each requested metric declares which scope it belongs to; a metric whose
             scope does not match the target is rejected. Fails with NOT_FOUND when the
             target's instance does not exist.
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.MetricId'
          title: metrics
          maxItems: 32
          minItems: 1
          description: |-
            Required. The metrics to return. Each yields one MetricSeries in the
             response (or one entry in partial_errors if it could not be served).
        interval:
          title: interval
          description: |-
            Required. The half-open window `[start_time, end_time)` to query (AIP-145).
             Relative ranges like "last 24h" are resolved to absolute timestamps by the
             client.
          $ref: '#/components/schemas/google.type.Interval'
        step:
          title: step
          description: |-
            Optional. The requested bucket width (resolution). The server clamps it
             per metric to at least that metric's probe cadence and to a total-point
             ceiling; each series echoes the width it actually used in Points.step.
             When unset the server picks a width that yields a chart-friendly number of
             points.
          type: string
          format: duration
        comparison:
          title: comparison
          description: |-
            Optional. A period offset for period-over-period comparison (e.g. 24h, 7d).
             When set, each series carries a TrendDelta comparing the window against the
             same-length window shifted back by this offset. The previous-period line
             itself is not returned; a client that wants to overlay it issues a second
             QueryMetrics with the interval shifted back by the same offset.
          type: string
          format: duration
      title: QueryMetricsRequest
      additionalProperties: false
    querylane.console.v1alpha1.QueryMetricsResponse:
      type: object
      properties:
        interval:
          title: interval
          description: |-
            The requested window, echoed back. A series' buckets cover the window and
             may extend slightly past end_time when its step does not divide the window
             evenly; the trailing partial bucket only aggregates samples before
             end_time.
          $ref: '#/components/schemas/google.type.Interval'
        step:
          title: step
          description: |-
            The finest bucket width used across the returned series. Each series'
             Points.step is authoritative: a metric with a coarser probe cadence uses a
             coarser width.
          type: string
          format: duration
        series:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.MetricSeries'
          title: series
          description: One series per successfully-served metric, in request order.
        partialErrors:
          type: array
          items:
            $ref: '#/components/schemas/google.rpc.Status'
          title: partial_errors
          description: |-
            Per-metric failures. The RPC still returns OK; a metric that could not be
             served (e.g. an IO metric on PostgreSQL < 16, or a permissions gap) is
             omitted from `series` and reported here. The failing metric is identified
             by an ErrorInfo detail with metadata `{"metric": "<METRIC_ID_...>"}` —
             mirrors GetInstanceOverviewResponse.partial_errors.
      title: QueryMetricsResponse
      additionalProperties: false
    querylane.console.v1alpha1.QueryRowBatch:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.TableResultRow'
          title: rows
      title: QueryRowBatch
      additionalProperties: false
      description: QueryRowBatch is a batch of rows in an ExecuteQuery stream.
    querylane.console.v1alpha1.QueryRuntimeInsight:
      type: object
      properties:
        query:
          type: string
          title: query
          description: |-
            Bounded, redacted SQL preview for display. Empty when PostgreSQL does not
             expose representative text for this statement.
        calls:
          exclusiveMinimum: 0
          type:
            - integer
            - string
          title: calls
          format: int64
          description: Number of calls since stats reset.
        totalTimeMs:
          type: number
          title: total_time_ms
          minimum: 0
          format: double
          description: Total execution time in milliseconds since stats reset.
        meanTimeMs:
          type: number
          title: mean_time_ms
          minimum: 0
          format: double
          description: Mean execution time in milliseconds.
        totalTimeRatio:
          type: number
          title: total_time_ratio
          maximum: 1
          minimum: 0
          format: double
          description: Ratio to the slowest query returned in this response.
        queryId:
          type:
            - integer
            - string
          title: query_id
          format: int64
          description: PostgreSQL pg_stat_statements queryid when available.
      title: QueryRuntimeInsight
      additionalProperties: false
    querylane.console.v1alpha1.QueryStats:
      type: object
      properties:
        rowCount:
          type:
            - integer
            - string
          title: row_count
          format: int64
          description: Output-only. Total rows emitted in the response stream.
        latency:
          title: latency
          description: Output-only. Query execution latency.
          type: string
          format: duration
        notices:
          type: array
          items:
            type: string
          title: notices
          description: Output-only. Database notices emitted during execution.
        truncated:
          type: boolean
          title: truncated
          description: Output-only. Whether the server truncated results at the requested limit.
      title: QueryStats
      additionalProperties: false
      description: QueryStats is the final message in an ExecuteQuery stream.
    querylane.console.v1alpha1.ReadCellValueRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          pattern: ^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?/databases/[^/]+/schemas/[^/]+/tables/[^/]+$
          description: |-
            Required. The table the cell belongs to.
             Format: instances/{instance}/databases/{database}/schemas/{schema}/tables/{table}
        fullValueToken:
          type: string
          title: full_value_token
          minLength: 1
          description: |-
            Required. Token from a TableCell.full_value_token. The server rejects
             a token whose payload table_name does not match `name` — this binds
             the token to a specific table and prevents cross-table replay.
        maxBytes:
          type:
            - integer
            - string
          title: max_bytes
          maximum: 67108864
          minimum: 0
          format: int64
          description: |-
            Optional. Max bytes to return. 0 = server default (16 MiB), hard cap 64 MiB.
             For text/json/xml the value is interpreted as a character ceiling
             (PostgreSQL substring is character-based); resulting wire bytes may be
             up to 4× this for multi-byte UTF-8. Byte-exact for bytea.
      title: ReadCellValueRequest
      additionalProperties: false
    querylane.console.v1alpha1.ReadCellValueResponse:
      type: object
      properties:
        value:
          title: value
          description: |-
            Output-only. truncated=true means even the full read still hit max_bytes;
             full_size_bytes reports the actual on-disk size.
          $ref: '#/components/schemas/querylane.console.v1alpha1.TableCell'
      title: ReadCellValueResponse
      additionalProperties: false
    querylane.console.v1alpha1.ReadRowsRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          pattern: ^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?/databases/[^/]+/schemas/[^/]+/tables/[^/]+$
          description: |-
            Required. The table to read from.
             Format: instances/{instance}/databases/{database}/schemas/{schema}/tables/{table}
        pageSize:
          type: integer
          title: page_size
          maximum: 500
          minimum: 0
          format: int32
          description: Optional. Default 50, hard cap 500.
        pageToken:
          type: string
          title: page_token
          description: |-
            Optional. Opaque cursor from a previous response (AIP-158). Bound to
             (table, projection, filter, order, page_size); mismatch or expiry
             returns INVALID_ARGUMENT.
        selectedColumns:
          type: array
          items:
            type: string
          title: selected_columns
          maxItems: 256
          description: Optional. Subset of columns. Empty = all columns in catalog ordinal order.
        orderBy:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.RowOrder'
          title: order_by
          maxItems: 8
          description: |-
            Optional. Compound order. Server appends identity columns internally as
             a tiebreaker; clients neither see nor need to provide it.
        filter:
          title: filter
          description: Optional. Recursive filter tree.
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowFilter'
        rowCountMode:
          title: row_count_mode
          description: Optional. Default NONE.
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowCountMode'
        cellValueMode:
          title: cell_value_mode
          description: Optional. Default PREVIEW with server-default max_cell_bytes.
          $ref: '#/components/schemas/querylane.console.v1alpha1.CellValueMode'
        maxCellBytes:
          type: integer
          title: max_cell_bytes
          maximum: 1048576
          minimum: 0
          format: int32
          description: |-
            Optional. Per-cell preview cap. 0 = server default (8 KiB), hard cap 1 MiB.
             For text/json/xml the value is interpreted as a character ceiling
             (PostgreSQL substring is character-based); resulting wire bytes may be
             up to 4× this for multi-byte UTF-8. Byte-exact for bytea.
        maxResponseBytes:
          type:
            - integer
            - string
          title: max_response_bytes
          maximum: 33554432
          minimum: 0
          format: int64
          description: |-
            Optional. Per-response wire-byte cap. 0 = server default (8 MiB),
             hard cap 32 MiB. When hit mid-page the server stops adding rows and
             returns next_page_token from the last included row. Clients must NOT
             treat "fewer rows than page_size" as "last page" — only an empty
             next_page_token signals the last page.
      title: ReadRowsRequest
      additionalProperties: false
    querylane.console.v1alpha1.ReadRowsResponse:
      type: object
      properties:
        resultSet:
          title: result_set
          description: The retrieved result set.
          $ref: '#/components/schemas/querylane.console.v1alpha1.TableResultSet'
        nextPageToken:
          type: string
          title: next_page_token
          description: Empty means this is the last page.
        limits:
          title: limits
          description: Effective server caps applied this call.
          $ref: '#/components/schemas/querylane.console.v1alpha1.ResponseLimits'
      title: ReadRowsResponse
      additionalProperties: false
    querylane.console.v1alpha1.ReferentialAction:
      type: string
      title: ReferentialAction
      enum:
        - REFERENTIAL_ACTION_UNSPECIFIED
        - REFERENTIAL_ACTION_NO_ACTION
        - REFERENTIAL_ACTION_RESTRICT
        - REFERENTIAL_ACTION_CASCADE
        - REFERENTIAL_ACTION_SET_NULL
        - REFERENTIAL_ACTION_SET_DEFAULT
    querylane.console.v1alpha1.Replica:
      type: object
      properties:
        replicaId:
          type: string
          title: replica_id
          description: |-
            Output-only. Stable per-process identifier (also the lease owner token).
             Regenerated on every process start.
        hostname:
          type: string
          title: hostname
          description: Output-only. Hostname of the machine running the replica.
        pid:
          type:
            - integer
            - string
          title: pid
          format: int64
          description: Output-only. OS process id of the replica.
        startedAt:
          title: started_at
          description: Output-only. When the replica process started heartbeating.
          type: string
          format: date-time
        lastSeenAt:
          title: last_seen_at
          description: Output-only. When the replica last heartbeated.
          type: string
          format: date-time
        active:
          type: boolean
          title: active
          description: |-
            Output-only. Whether the last heartbeat is recent enough for the
             replica to be considered alive. Computed against the meta database
             clock, so it is consistent across replicas.
      title: Replica
      additionalProperties: false
      description: |-
        Replica is one querylane backend process, registered via periodic
         heartbeats. Replicas coordinate background work through per-target leases;
         the replica id is the lease owner token used in runner executions.
    querylane.console.v1alpha1.ReplicaIdentity:
      type: object
      properties:
        replicaId:
          type: string
          title: replica_id
          description: Output-only. The replica's per-process identifier.
        hostname:
          type: string
          title: hostname
          description: |-
            Output-only. Hostname of the replica, empty when the replica's
             heartbeat row is gone (e.g. the process died and was pruned).
      title: ReplicaIdentity
      additionalProperties: false
      description: ReplicaIdentity identifies the replica holding a lease.
    querylane.console.v1alpha1.ReplicationHealth:
      type: object
      properties:
        status:
          title: status
          $ref: '#/components/schemas/querylane.console.v1alpha1.HealthCheckStatus'
        summary:
          type: string
          title: summary
        role:
          title: role
          $ref: '#/components/schemas/querylane.console.v1alpha1.ServerInfo.ReplicationRole'
        attachedReplicas:
          type: integer
          title: attached_replicas
          minimum: 0
          format: int32
        streamingReplicas:
          type: integer
          title: streaming_replicas
          minimum: 0
          format: int32
        synchronousReplicas:
          type: integer
          title: synchronous_replicas
          minimum: 0
          format: int32
        maxReplicationLagBytes:
          type:
            - integer
            - string
          title: max_replication_lag_bytes
          minimum: 0
          format: int64
        walReceiverActive:
          type: boolean
          title: wal_receiver_active
        replayLagSeconds:
          type:
            - integer
            - string
          title: replay_lag_seconds
          minimum: 0
          format: int64
      title: ReplicationHealth
      additionalProperties: false
      description: |-
        Replication health from pg_is_in_recovery, pg_stat_replication, and
         pg_stat_wal_receiver.
    querylane.console.v1alpha1.ResponseLimits:
      type: object
      properties:
        maxPageSize:
          type: integer
          title: max_page_size
          format: int32
        maxCellBytes:
          type: integer
          title: max_cell_bytes
          format: int32
        effectiveCellBytes:
          type: integer
          title: effective_cell_bytes
          format: int32
        maxResponseBytes:
          type:
            - integer
            - string
          title: max_response_bytes
          format: int64
        effectiveResponseBytes:
          type:
            - integer
            - string
          title: effective_response_bytes
          format: int64
          description: |-
            Cumulative wire bytes already consumed by this response. Pair with
             max_response_bytes to compute remaining budget; this is NOT the cap
             the server enforced (use max_response_bytes for that).
        maxFilterDepth:
          type: integer
          title: max_filter_depth
          format: int32
        maxFilterNodes:
          type: integer
          title: max_filter_nodes
          format: int32
        queryTimeout:
          title: query_timeout
          type: string
          format: duration
      title: ResponseLimits
      additionalProperties: false
      description: |-
        ResponseLimits reports the effective server caps applied to a response.
         Lets the client adapt — e.g. shrink page_size when the budget is tight.
    querylane.console.v1alpha1.Role:
      type: object
      properties:
        name:
          type: string
          title: name
          description: |-
            Output-only identifier. The unique resource name of the role.
             Format: instances/{instance}/roles/{role}
        roleName:
          type: string
          title: role_name
          description: |-
            Output-only. The exact PostgreSQL role name (rolname). May contain
             characters not legal in the resource-name segment, which is why it is
             surfaced separately from `name`.
        attributes:
          title: attributes
          description: |-
            Output-only. PostgreSQL role attributes from pg_roles. Whether the role
             can be used to log in is exposed via `attributes.can_login`.
          $ref: '#/components/schemas/querylane.console.v1alpha1.RoleAttributes'
        memberOf:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.RoleMembership'
          title: member_of
          description: Output-only. Direct parent roles this role is a member of.
        isSystemRole:
          type: boolean
          title: is_system_role
          description: Output-only. Whether this appears to be a PostgreSQL-managed system role.
        comment:
          type: string
          title: comment
          description: |-
            Output-only. The COMMENT ON ROLE description (pg_shdescription via
             pg_authid). Empty when the role has no comment.
      title: Role
      additionalProperties: false
      description: A Role represents a PostgreSQL server-level role in an Instance.
    querylane.console.v1alpha1.RoleAttributes:
      type: object
      properties:
        canLogin:
          type: boolean
          title: can_login
          description: Output-only. Whether the role may log in (rolcanlogin).
        isSuperuser:
          type: boolean
          title: is_superuser
          description: Output-only. Whether the role has superuser privileges (rolsuper).
        canCreateDatabase:
          type: boolean
          title: can_create_database
          description: Output-only. Whether the role may create new databases (rolcreatedb).
        canCreateRole:
          type: boolean
          title: can_create_role
          description: Output-only. Whether the role may create new roles (rolcreaterole).
        canReplicate:
          type: boolean
          title: can_replicate
          description: |-
            Output-only. Whether the role may initiate streaming replication
             and put the system in and out of backup mode (rolreplication).
        bypassesRls:
          type: boolean
          title: bypasses_rls
          description: |-
            Output-only. Whether the role bypasses every row-level security
             policy (rolbypassrls).
        inheritsByDefault:
          type: boolean
          title: inherits_by_default
          description: |-
            Output-only. Whether the role automatically inherits privileges from
             roles it is a member of (rolinherit).
        connectionLimit:
          type: integer
          title: connection_limit
          format: int32
          description: |-
            Output-only. Maximum concurrent connections allowed for the role.
             -1 means no limit (rolconnlimit).
        validUntil:
          title: valid_until
          description: |-
            Output-only. The time after which the role's password is no longer valid
             (rolvaliduntil). Unset when there is no expiry, including when the catalog
             stores 'infinity'.
          type: string
          format: date-time
        configParameters:
          type: array
          items:
            type: string
          title: config_parameters
          description: |-
            Output-only. Per-role default run-time configuration settings applied at
             login (rolconfig), each formatted as "parameter=value"
             (e.g. "work_mem=64MB").
      title: RoleAttributes
      additionalProperties: false
      description: PostgreSQL role attributes from pg_roles.
    querylane.console.v1alpha1.RoleDefaultPrivilege:
      type: object
      properties:
        creatorRole:
          type: string
          title: creator_role
          description: |-
            Output-only. Resource name of the role whose newly created objects trigger
             this default grant — the FOR ROLE in ALTER DEFAULT PRIVILEGES
             (pg_default_acl.defaclrole). Format: instances/{instance}/roles/{role}
        creatorRoleName:
          type: string
          title: creator_role_name
          description: Output-only. The exact PostgreSQL name of the creator role.
        objectType:
          title: object_type
          description: Output-only. The category of future object the default applies to.
          $ref: '#/components/schemas/querylane.console.v1alpha1.DefaultPrivilegeObjectType'
        schemaName:
          type: string
          title: schema_name
          description: |-
            Output-only. The schema the default is scoped to. Empty when it applies in
             every schema (pg_default_acl.defaclnamespace = 0).
        privilege:
          type: string
          title: privilege
          description: Output-only. The PostgreSQL privilege keyword granted (e.g. "SELECT").
        withGrantOption:
          type: boolean
          title: with_grant_option
          description: |-
            Output-only. Whether the role may grant this privilege onward
             (WITH GRANT OPTION).
      title: RoleDefaultPrivilege
      additionalProperties: false
      description: |-
        A default privilege (ALTER DEFAULT PRIVILEGES) that grants access to a role
         on objects of a given category created later by `creator_role`. Computed from
         pg_default_acl; reports the rows where the target role is the grantee.
    querylane.console.v1alpha1.RoleMembership:
      type: object
      properties:
        role:
          type: string
          title: role
          description: |-
            Output-only. Resource name of the parent role this role is a member of.
             Format: instances/{instance}/roles/{role}
        roleName:
          type: string
          title: role_name
          description: Output-only. The exact PostgreSQL parent role name (rolname).
        adminOption:
          type: boolean
          title: admin_option
          description: Output-only. Whether this role may grant the membership to others.
        inheritOption:
          type: boolean
          title: inherit_option
          description: Output-only. Whether privileges inherit through this membership by default.
        setOption:
          type: boolean
          title: set_option
          description: Output-only. Whether SET ROLE may use this membership.
        grantorRole:
          type: string
          title: grantor_role
          description: |-
            Output-only. Resource name of the role that granted the membership.
             Empty when the grantor is unknown.
             Format: instances/{instance}/roles/{role}
        grantor:
          type: string
          title: grantor
          description: Output-only. The exact PostgreSQL role name that granted the membership.
      title: RoleMembership
      additionalProperties: false
      description: A direct role membership edge from pg_auth_members.
    querylane.console.v1alpha1.RowCount:
      type: object
      properties:
        status:
          title: status
          description: Output-only.
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowCount.Status'
        value:
          type:
            - integer
            - string
          title: value
          format: int64
          description: Output-only. Valid only when status ∈ {AVAILABLE, ESTIMATED}.
      title: RowCount
      additionalProperties: false
      description: |-
        RowCount is a tagged union: `value` is meaningful only when status ∈
         {AVAILABLE, ESTIMATED}.
    querylane.console.v1alpha1.RowCount.Status:
      type: string
      title: Status
      enum:
        - STATUS_UNSPECIFIED
        - STATUS_NOT_REQUESTED
        - STATUS_AVAILABLE
        - STATUS_ESTIMATED
        - STATUS_UNAVAILABLE
    querylane.console.v1alpha1.RowCountMode:
      type: string
      title: RowCountMode
      enum:
        - ROW_COUNT_MODE_UNSPECIFIED
        - ROW_COUNT_MODE_NONE
        - ROW_COUNT_MODE_ESTIMATE
        - ROW_COUNT_MODE_EXACT
      description: Controls whether and how the response carries a row count.
    querylane.console.v1alpha1.RowFilter:
      type: object
      oneOf:
        - type: object
          properties:
            group:
              title: group
              $ref: '#/components/schemas/querylane.console.v1alpha1.RowFilterGroup'
          title: group
          required:
            - group
        - type: object
          properties:
            predicate:
              title: predicate
              $ref: '#/components/schemas/querylane.console.v1alpha1.RowPredicate'
          title: predicate
          required:
            - predicate
      title: RowFilter
      additionalProperties: false
      description: |-
        RowFilter is a tree of conditions. Empty = no WHERE clause.

         Example: (a = 1 OR b IS NULL) AND created_at > '2025-01-01'
    querylane.console.v1alpha1.RowFilterGroup:
      type: object
      properties:
        logic:
          not:
            enum:
              - LOGIC_UNSPECIFIED
          title: logic
          description: Required.
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowFilterGroup.Logic'
        children:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.RowFilter'
          title: children
          maxItems: 64
          minItems: 1
          description: Bounded fan-out to prevent pathological trees.
      title: RowFilterGroup
      additionalProperties: false
    querylane.console.v1alpha1.RowFilterGroup.Logic:
      type: string
      title: Logic
      enum:
        - LOGIC_UNSPECIFIED
        - LOGIC_AND
        - LOGIC_OR
    querylane.console.v1alpha1.RowIdentity:
      type: object
      properties:
        source:
          title: source
          description: Output-only. How row identity is derived.
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowIdentity.Source'
        columnNames:
          type: array
          items:
            type: string
          title: column_names
          description: Output-only. Column names used for row identity when available.
      title: RowIdentity
      additionalProperties: false
    querylane.console.v1alpha1.RowIdentity.Source:
      type: string
      title: Source
      enum:
        - SOURCE_UNSPECIFIED
        - SOURCE_PRIMARY_KEY
        - SOURCE_UNIQUE_CONSTRAINT
        - SOURCE_OPAQUE_ROW_KEY
    querylane.console.v1alpha1.RowOrder:
      type: object
      properties:
        column:
          type: string
          title: column
          maxLength: 63
          minLength: 1
          description: Required. Bare column name (NOT pre-quoted).
        direction:
          title: direction
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowOrder.Direction'
        nullOrder:
          title: null_order
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowOrder.NullOrder'
      title: RowOrder
      additionalProperties: false
      description: |-
        Structured ordering — avoids the AIP-132 string parser, which is unsafe
         with PostgreSQL identifiers (spaces, mixed case, quotes).
    querylane.console.v1alpha1.RowOrder.Direction:
      type: string
      title: Direction
      enum:
        - DIRECTION_UNSPECIFIED
        - DIRECTION_ASC
        - DIRECTION_DESC
    querylane.console.v1alpha1.RowOrder.NullOrder:
      type: string
      title: NullOrder
      enum:
        - NULL_ORDER_UNSPECIFIED
        - NULL_ORDER_FIRST
        - NULL_ORDER_LAST
    querylane.console.v1alpha1.RowPredicate:
      type: object
      properties:
        column:
          type: string
          title: column
          maxLength: 63
          minLength: 1
          description: Required. Bare column name as it appears in the catalog (NOT pre-quoted).
        operator:
          not:
            enum:
              - OPERATOR_UNSPECIFIED
          title: operator
          description: Required.
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowPredicate.Operator'
        values:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.TableValue'
          title: values
          maxItems: 1024
          description: |-
            Predicate literals. Uses TableValue (NOT TableCell) — preview metadata
             makes no sense in a filter.
               IS_NULL/IS_NOT_NULL  -> 0 values
               IN/NOT_IN            -> 1..1024 values
               BETWEEN              -> exactly 2 values
               everything else      -> exactly 1 value
      title: RowPredicate
      additionalProperties: false
    querylane.console.v1alpha1.RowPredicate.Operator:
      type: string
      title: Operator
      enum:
        - OPERATOR_UNSPECIFIED
        - OPERATOR_EQUAL
        - OPERATOR_NOT_EQUAL
        - OPERATOR_GREATER_THAN
        - OPERATOR_GREATER_THAN_OR_EQUAL
        - OPERATOR_LESS_THAN
        - OPERATOR_LESS_THAN_OR_EQUAL
        - OPERATOR_LIKE
        - OPERATOR_ILIKE
        - OPERATOR_IN
        - OPERATOR_NOT_IN
        - OPERATOR_IS_NULL
        - OPERATOR_IS_NOT_NULL
        - OPERATOR_BETWEEN
        - OPERATOR_JSON_CONTAINS
    querylane.console.v1alpha1.RunnerExecution:
      type: object
      properties:
        runnerName:
          type: string
          title: runner_name
          description: |-
            Output-only. The runner this state belongs to (e.g. "probe_cache",
             "instance_connectivity", "sample_retention").
        target:
          type: string
          title: target
          description: |-
            Output-only. The target the runner executes against, as an AIP resource
             name: "instances/{instance}" for instance-level runners,
             "instances/{instance}/databases/{database}" for database-level runners,
             or "meta" for jobs operating on querylane's own database.
        leaseHeld:
          type: boolean
          title: lease_held
          description: |-
            Output-only. Whether a replica currently holds the execution lease
             (a run is in flight right now).
        lastStartedAt:
          title: last_started_at
          description: Output-only. When the most recent run started.
          type: string
          format: date-time
        lastFinishedAt:
          title: last_finished_at
          description: Output-only. When the most recent run finished, successfully or not.
          type: string
          format: date-time
        lastSuccessAt:
          title: last_success_at
          description: |-
            Output-only. When the runner last completed successfully for this
             target. A stale value relative to the runner's cadence means sampling
             for this target is unhealthy.
          type: string
          format: date-time
        lastError:
          type: string
          title: last_error
          description: |-
            Output-only. The most recent infrastructure failure, empty after a
             successful run. Collection-level issues (e.g. missing permissions on a
             statistics view) do not surface here; they show up as missing samples.
      title: RunnerExecution
      additionalProperties: false
      description: |-
        RunnerExecution is the scheduling state of one background runner against
         one target. Backed by the same lease bookkeeping the multi-replica
         coordination uses, so it reflects the fleet, not a single replica.
    querylane.console.v1alpha1.SampleTableStats:
      type: object
      properties:
        tableName:
          type: string
          title: table_name
          description: Output-only. Unqualified table name, e.g. "instance_cache_sample".
        estimatedRowCount:
          type:
            - integer
            - string
          title: estimated_row_count
          format: int64
          description: |-
            Output-only. Planner row estimate (pg_class.reltuples). -1 when the
             table has never been vacuumed or analyzed.
        totalBytes:
          type:
            - integer
            - string
          title: total_bytes
          format: int64
          description: |-
            Output-only. Total on-disk size including indexes and TOAST
             (pg_total_relation_size).
        oldestSampleAt:
          title: oldest_sample_at
          description: |-
            Output-only. Observation time of the oldest retained sample. Unset
             when the table is empty.
          type: string
          format: date-time
        newestSampleAt:
          title: newest_sample_at
          description: |-
            Output-only. Observation time of the newest sample. Unset when the
             table is empty.
          type: string
          format: date-time
      title: SampleTableStats
      additionalProperties: false
      description: SampleTableStats is the storage footprint of one metrics sample table.
    querylane.console.v1alpha1.Schema:
      type: object
      properties:
        name:
          type: string
          title: name
          description: |-
            Output-only identifier. The unique resource name of the schema.
             Format: instances/{instance}/databases/{database}/schemas/{schema}
        displayName:
          type: string
          title: display_name
          description: Output-only. The display name of the schema.
        owner:
          type: string
          title: owner
          description: Output-only. The PostgreSQL role that owns this schema.
        isSystemSchema:
          type: boolean
          title: is_system_schema
          description: |-
            Output-only. Whether this is a system schema that should typically
             be hidden from end users (e.g., information_schema, pg_catalog).
        lastDdlTime:
          title: last_ddl_time
          description: Output-only. The last time a DDL operation was performed on this schema.
          type: string
          format: date-time
        createTime:
          title: create_time
          description: Output-only. The time when the schema was created.
          type: string
          format: date-time
      title: Schema
      additionalProperties: false
      description: A Schema represents a namespace for tables within a Database.
    querylane.console.v1alpha1.SecretSource:
      type: object
      oneOf:
        - type: object
          properties:
            env:
              type: string
              title: env
              minLength: 1
              description: Environment variable name. The value is resolved by the server process.
          title: env
          required:
            - env
        - type: object
          properties:
            inline:
              type: string
              title: inline
              minLength: 1
              description: Inline secret value. Intended for development and back-compat; encrypted at rest.
          title: inline
          required:
            - inline
        - type: object
          properties:
            ref:
              type: string
              title: ref
              minLength: 1
              description: |-
                Opaque external secret reference. Reserved for future providers such as Vault
                 or cloud secret managers.
          title: ref
          required:
            - ref
      title: SecretSource
      additionalProperties: false
      description: SecretSource describes where a secret value should be resolved from.
    querylane.console.v1alpha1.SequentialScanHotspot:
      type: object
      properties:
        schemaName:
          type: string
          title: schema_name
          minLength: 1
          description: Schema containing the table.
        tableName:
          type: string
          title: table_name
          minLength: 1
          description: Table name.
        sequentialScans:
          type:
            - integer
            - string
          title: sequential_scans
          minimum: 0
          format: int64
          description: Sequential scan count since stats reset.
        sequentialTuplesRead:
          type:
            - integer
            - string
          title: sequential_tuples_read
          minimum: 0
          format: int64
          description: Tuples read by sequential scans since stats reset.
        indexScans:
          type:
            - integer
            - string
          title: index_scans
          minimum: 0
          format: int64
          description: Index scan count since stats reset.
        estimatedLiveRows:
          type:
            - integer
            - string
          title: estimated_live_rows
          minimum: 0
          format: int64
          description: Estimated live row count from pg_stat_user_tables.
        totalSizeBytes:
          type:
            - integer
            - string
          title: total_size_bytes
          minimum: 0
          format: int64
          description: Total table size in bytes.
        sequentialScanRatio:
          type: number
          title: sequential_scan_ratio
          maximum: 1
          minimum: 0
          format: double
          description: Sequential scans divided by sequential plus index scans.
      title: SequentialScanHotspot
      additionalProperties: false
      description: |
        sequential_scan_ratio_zero_when_no_scans // sequential_scan_ratio must be zero when no scans were observed
    querylane.console.v1alpha1.ServerInfo:
      type: object
      properties:
        version:
          type: string
          title: version
          description: The full version string, e.g. "PostgreSQL 16.3 on x86_64-pc-linux-gnu".
        versionNum:
          type: integer
          title: version_num
          format: int32
          description: The numeric server version, e.g. 160003 for PostgreSQL 16.3.
        versionShort:
          type: string
          title: version_short
          description: Human-readable version derived from version_num, e.g. "17.8" or "9.6.12".
        startedAt:
          title: started_at
          description: The time the PostgreSQL server was started.
          type: string
          format: date-time
        replicationRole:
          title: replication_role
          description: The replication role of the server.
          $ref: '#/components/schemas/querylane.console.v1alpha1.ServerInfo.ReplicationRole'
        maxConnections:
          type: integer
          title: max_connections
          format: int32
          description: The maximum number of concurrent connections the server allows.
      title: ServerInfo
      additionalProperties: false
      description: Live server metadata queried from the PostgreSQL instance.
    querylane.console.v1alpha1.ServerInfo.ReplicationRole:
      type: string
      title: ReplicationRole
      enum:
        - REPLICATION_ROLE_UNSPECIFIED
        - REPLICATION_ROLE_PRIMARY
        - REPLICATION_ROLE_REPLICA
    querylane.console.v1alpha1.SetupAppDatabaseRequest:
      type: object
      oneOf:
        - type: object
          properties:
            embeddedConfig:
              title: embedded_config
              description: Configure using the embedded PostgreSQL instance.
              $ref: '#/components/schemas/querylane.console.v1alpha1.EmbeddedSetupConfig'
          title: embedded_config
          required:
            - embeddedConfig
        - type: object
          properties:
            postgresConfig:
              title: postgres_config
              description: Configure using an external PostgreSQL connection.
              $ref: '#/components/schemas/querylane.console.v1alpha1.PostgresConfig'
          title: postgres_config
          required:
            - postgresConfig
      title: SetupAppDatabaseRequest
      additionalProperties: false
    querylane.console.v1alpha1.SetupAppDatabaseResponse:
      type: object
      properties:
        event:
          title: event
          description: Output-only. The progress event for the current step.
          $ref: '#/components/schemas/querylane.console.v1alpha1.SetupProgressEvent'
      title: SetupAppDatabaseResponse
      additionalProperties: false
    querylane.console.v1alpha1.SetupMethod:
      type: string
      title: SetupMethod
      enum:
        - SETUP_METHOD_UNSPECIFIED
        - SETUP_METHOD_UI_CONFIGURED
        - SETUP_METHOD_MANUAL_YAML
        - SETUP_METHOD_EMBEDDED
      description: SetupMethod describes a way to configure the application database.
    querylane.console.v1alpha1.SetupProgressEvent:
      type: object
      properties:
        stepId:
          title: step_id
          description: Output-only. Identifies which setup step this event refers to.
          $ref: '#/components/schemas/querylane.console.v1alpha1.SetupStep'
        displayName:
          type: string
          title: display_name
          description: Output-only. Human-readable label for display.
        state:
          title: state
          description: Output-only. Current state of this step.
          $ref: '#/components/schemas/querylane.console.v1alpha1.StepState'
        error:
          type: string
          title: error
          description: Output-only. Error details when state is STEP_STATE_FAILED, empty otherwise.
      title: SetupProgressEvent
      additionalProperties: false
      description: |-
        SetupProgressEvent reports the state of a single step in the database setup
         pipeline. Both streaming RPCs return the same event type.

         Stream protocol:
          1. First batch: all steps for the flow are sent with STEP_STATE_PENDING so
             the frontend can render the full list upfront.
          2. Subsequent messages: individual step state transitions
             (IN_PROGRESS → SUCCEEDED or FAILED).
    querylane.console.v1alpha1.SetupStep:
      type: string
      title: SetupStep
      enum:
        - SETUP_STEP_UNSPECIFIED
        - SETUP_STEP_STARTING_EMBEDDED
        - SETUP_STEP_CONNECTING
        - SETUP_STEP_MIGRATING
        - SETUP_STEP_INITIALIZING_SERVICES
        - SETUP_STEP_PERSISTING_CONFIG
        - SETUP_STEP_WAITING_FOR_CONFIG
        - SETUP_STEP_CONFIG_DETECTED
      description: |-
        SetupStep identifies a phase in the database setup pipeline.
         The frontend uses these values to match UI elements to progress events.
    querylane.console.v1alpha1.StatsAccessHealth:
      type: object
      properties:
        status:
          title: status
          $ref: '#/components/schemas/querylane.console.v1alpha1.HealthCheckStatus'
        summary:
          type: string
          title: summary
        currentUser:
          type: string
          title: current_user
        superuser:
          type: boolean
          title: superuser
        pgMonitorMember:
          type: boolean
          title: pg_monitor_member
        pgReadAllStatsMember:
          type: boolean
          title: pg_read_all_stats_member
        canReadPgStatActivity:
          type: boolean
          title: can_read_pg_stat_activity
        canReadPgStatDatabase:
          type: boolean
          title: can_read_pg_stat_database
      title: StatsAccessHealth
      additionalProperties: false
      description: Statistics visibility for the connected role.
    querylane.console.v1alpha1.StepState:
      type: string
      title: StepState
      enum:
        - STEP_STATE_UNSPECIFIED
        - STEP_STATE_PENDING
        - STEP_STATE_IN_PROGRESS
        - STEP_STATE_SUCCEEDED
        - STEP_STATE_FAILED
      description: StepState represents the lifecycle state of a single setup step.
    querylane.console.v1alpha1.StorageMetrics:
      type: object
      properties:
        totalSizeBytes:
          type:
            - integer
            - string
          title: total_size_bytes
          minimum: 0
          format: int64
          description: Total size of all non-template databases in bytes.
      title: StorageMetrics
      additionalProperties: false
      description: Disk usage metrics across all non-template databases.
    querylane.console.v1alpha1.StreamRowsBatch:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.TableResultRow'
          title: rows
          description: Output-only.
      title: StreamRowsBatch
      additionalProperties: false
    querylane.console.v1alpha1.StreamRowsMetadata:
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.TableResultColumn'
          title: columns
          description: Output-only.
        rowIdentity:
          title: row_identity
          description: Output-only.
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowIdentity'
        observedAt:
          title: observed_at
          description: Output-only.
          type: string
          format: date-time
        limits:
          title: limits
          description: Output-only.
          $ref: '#/components/schemas/querylane.console.v1alpha1.ResponseLimits'
      title: StreamRowsMetadata
      additionalProperties: false
    querylane.console.v1alpha1.StreamRowsRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          pattern: ^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?/databases/[^/]+/schemas/[^/]+/tables/[^/]+$
          description: Required. Same shape as ReadRowsRequest.name.
        selectedColumns:
          type: array
          items:
            type: string
          title: selected_columns
          maxItems: 256
          description: Optional. Subset of columns.
        orderBy:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.RowOrder'
          title: order_by
          maxItems: 8
          description: Optional. Compound order.
        filter:
          title: filter
          description: Optional. Recursive filter tree.
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowFilter'
        cellValueMode:
          title: cell_value_mode
          description: Optional. Default PREVIEW.
          $ref: '#/components/schemas/querylane.console.v1alpha1.CellValueMode'
        maxCellBytes:
          type: integer
          title: max_cell_bytes
          maximum: 1048576
          minimum: 0
          format: int32
          description: Optional. Per-cell preview cap. 0 = server default.
        maxRows:
          type:
            - integer
            - string
          title: max_rows
          maximum: 10000000
          minimum: 0
          format: int64
          description: Optional. Hard ceiling on rows. 0 = server default (1,000,000).
        batchSize:
          type: integer
          title: batch_size
          maximum: 5000
          minimum: 0
          format: int32
          description: Optional. Rows per batch. 0 = server default (1000).
        maxTotalBytes:
          type:
            - integer
            - string
          title: max_total_bytes
          maximum: 17179869184
          minimum: 0
          format: int64
          description: |-
            Optional. Ceiling on cumulative response payload bytes streamed.
             0 = uncapped (still bounded by max_rows + per-cell cap). Stream ends
             with stats.truncated=true if hit. Hard cap 16 GiB.
      title: StreamRowsRequest
      additionalProperties: false
    querylane.console.v1alpha1.StreamRowsResponse:
      type: object
      oneOf:
        - type: object
          properties:
            batch:
              title: batch
              description: Zero or more.
              $ref: '#/components/schemas/querylane.console.v1alpha1.StreamRowsBatch'
          title: batch
          required:
            - batch
        - type: object
          properties:
            metadata:
              title: metadata
              description: Exactly one, first.
              $ref: '#/components/schemas/querylane.console.v1alpha1.StreamRowsMetadata'
          title: metadata
          required:
            - metadata
        - type: object
          properties:
            stats:
              title: stats
              description: Exactly one, last.
              $ref: '#/components/schemas/querylane.console.v1alpha1.StreamRowsStats'
          title: stats
          required:
            - stats
      title: StreamRowsResponse
      additionalProperties: false
    querylane.console.v1alpha1.StreamRowsStats:
      type: object
      properties:
        rowCount:
          type:
            - integer
            - string
          title: row_count
          format: int64
          description: Output-only. Total rows emitted in this stream.
        latency:
          title: latency
          description: Output-only. End-to-end latency.
          type: string
          format: duration
        truncated:
          type: boolean
          title: truncated
          description: Output-only. True when max_rows or max_total_bytes capped the stream early.
      title: StreamRowsStats
      additionalProperties: false
    querylane.console.v1alpha1.Table:
      type: object
      properties:
        name:
          type: string
          title: name
          description: |-
            Output-only identifier. The unique resource name of the table.
             Format: instances/{instance}/databases/{database}/schemas/{schema}/tables/{table}
        displayName:
          type: string
          title: display_name
          description: Output-only. The display name of the table.
        tableType:
          title: table_type
          description: Output-only. The type of this table object.
          $ref: '#/components/schemas/querylane.console.v1alpha1.Table.TableType'
        isSystemTable:
          type: boolean
          title: is_system_table
          description: |-
            Output-only. Whether this is a system table that should typically
             be hidden from end users.
        comment:
          type: string
          title: comment
          description: |-
            Output-only. User-provided comment or description for the table.
             May be empty if no comment was set.
        owner:
          type: string
          title: owner
          description: Output-only. The PostgreSQL role that owns this table.
        rowCount:
          type:
            - integer
            - string
          title: row_count
          format: int64
          description: |-
            Output-only. Estimated row count from PostgreSQL statistics (pg_class.reltuples).
             This value is an approximation updated by ANALYZE operations.
        sizeBytes:
          type:
            - integer
            - string
          title: size_bytes
          format: int64
          description: |-
            Output-only. Total disk size of the table in bytes, including indexes and
             TOAST data (pg_total_relation_size).
        createTime:
          title: create_time
          description: Output-only. The time when the table was created.
          type: string
          format: date-time
        lastDdlTime:
          title: last_ddl_time
          description: Output-only. The last time a DDL operation was performed on this table.
          type: string
          format: date-time
      title: Table
      additionalProperties: false
      description: A Table represents a table within a Schema.
    querylane.console.v1alpha1.Table.TableType:
      type: string
      title: TableType
      enum:
        - TABLE_TYPE_UNSPECIFIED
        - TABLE_TYPE_BASE_TABLE
        - TABLE_TYPE_TEMPORARY
        - TABLE_TYPE_EXTERNAL
        - TABLE_TYPE_PARTITIONED
      description: The type of table object.
    querylane.console.v1alpha1.TableCacheHitInsight:
      type: object
      properties:
        schemaName:
          type: string
          title: schema_name
          minLength: 1
          description: Schema containing the table.
        tableName:
          type: string
          title: table_name
          minLength: 1
          description: Table name.
        heapBlocksHit:
          type:
            - integer
            - string
          title: heap_blocks_hit
          minimum: 0
          format: int64
          description: Heap blocks served from shared buffers since stats reset.
        heapBlocksRead:
          type:
            - integer
            - string
          title: heap_blocks_read
          minimum: 0
          format: int64
          description: Heap blocks read from disk since stats reset.
        hitRatio:
          type: number
          title: hit_ratio
          maximum: 1
          minimum: 0
          format: double
          description: Heap cache hit ratio. Values below 0.9 are warning-worthy in the UI.
        totalSizeBytes:
          type:
            - integer
            - string
          title: total_size_bytes
          minimum: 0
          format: int64
          description: Total table size in bytes.
      title: TableCacheHitInsight
      additionalProperties: false
      description: |
        cache_hit_empty_ratio_zero // hit_ratio must be zero when no heap blocks were observed
    querylane.console.v1alpha1.TableCell:
      type: object
      properties:
        value:
          title: value
          description: Output-only.
          $ref: '#/components/schemas/querylane.console.v1alpha1.TableValue'
        truncated:
          type: boolean
          title: truncated
          description: |-
            Output-only. True when `value` carries a prefix of the actual cell
             rather than the whole thing. Implies full_size_bytes and
             full_value_token are set.
        fullSizeBytes:
          type:
            - integer
            - string
          title: full_size_bytes
          format: int64
          description: |-
            Output-only. Total octet length of the actual on-disk value, when
             knowable.
        fullValueToken:
          type: string
          title: full_value_token
          description: |-
            Output-only. Opaque, HMAC-signed token usable with ReadCellValue.
             Empty when truncated=false.
      title: TableCell
      additionalProperties: false
      description: 'TableCell is a response-side cell: a TableValue plus optional preview metadata.'
    querylane.console.v1alpha1.TableConstraint:
      type: object
      properties:
        constraintName:
          type: string
          title: constraint_name
          description: Output-only. Constraint name as defined in the database. This embedded metadata is not an AIP resource.
        type:
          title: type
          description: Output-only. High-level constraint type.
          $ref: '#/components/schemas/querylane.console.v1alpha1.ConstraintType'
        columnNames:
          type: array
          items:
            type: string
          title: column_names
          description: Output-only. Column names participating in the constraint, if applicable. These are not AIP resource names.
        referencedTable:
          type: string
          title: referenced_table
          description: Output-only. Referenced table resource for foreign keys, if applicable.
        referencedColumnNames:
          type: array
          items:
            type: string
          title: referenced_column_names
          description: Output-only. Referenced column names for foreign keys, if applicable. These are not AIP resource names.
        onUpdate:
          title: on_update
          description: Output-only. Foreign key ON UPDATE action, if applicable.
          $ref: '#/components/schemas/querylane.console.v1alpha1.ReferentialAction'
        onDelete:
          title: on_delete
          description: Output-only. Foreign key ON DELETE action, if applicable.
          $ref: '#/components/schemas/querylane.console.v1alpha1.ReferentialAction'
        definition:
          type: string
          title: definition
          description: Output-only. Raw database definition or normalized SQL snippet.
      title: TableConstraint
      additionalProperties: false
    querylane.console.v1alpha1.TableIndex:
      type: object
      properties:
        indexName:
          type: string
          title: index_name
          description: Output-only. Index name as defined in the database. This embedded metadata is not an AIP resource.
        method:
          type: string
          title: method
          description: Output-only. Index access method (e.g. btree, gin, gist).
        isUnique:
          type: boolean
          title: is_unique
          description: Output-only. Whether the index enforces uniqueness.
        keyColumns:
          type: array
          items:
            type: string
          title: key_columns
          description: Output-only. Raw key column database identifiers in order, not AIP resource names.
        includedColumns:
          type: array
          items:
            type: string
          title: included_columns
          description: Output-only. Raw included column database identifiers, not AIP resource names.
        predicate:
          type: string
          title: predicate
          description: Output-only. Predicate for partial indexes, if applicable.
        sizeBytes:
          type:
            - integer
            - string
          title: size_bytes
          format: int64
          description: Output-only. Total size of the index in bytes, if available.
        keyParts:
          type: array
          items:
            type: string
          title: key_parts
          description: Output-only. Raw key column identifiers or expressions in index order, excluding INCLUDE columns.
        isValid:
          type: boolean
          title: is_valid
          description: Output-only. Whether PostgreSQL currently considers the index valid.
        hasExpression:
          type: boolean
          title: has_expression
          description: Output-only. Whether at least one key part is an expression rather than a plain column.
        definition:
          type: string
          title: definition
          description: Output-only. Normalized CREATE INDEX statement from PostgreSQL.
        scanCount:
          type:
            - integer
            - string
          title: scan_count
          format: int64
          description: Output-only. Number of index scans reported by pg_stat_user_indexes.
        tuplesRead:
          type:
            - integer
            - string
          title: tuples_read
          format: int64
          description: Output-only. Number of index entries returned by pg_stat_user_indexes.
        tuplesFetched:
          type:
            - integer
            - string
          title: tuples_fetched
          format: int64
          description: Output-only. Number of live table rows fetched by pg_stat_user_indexes.
        blocksHit:
          type:
            - integer
            - string
          title: blocks_hit
          format: int64
          description: Output-only. Buffer hits for this index from pg_statio_user_indexes.
        blocksRead:
          type:
            - integer
            - string
          title: blocks_read
          format: int64
          description: Output-only. Buffer reads for this index from pg_statio_user_indexes.
        hasUsageStats:
          type: boolean
          title: has_usage_stats
          description: Output-only. Whether pg_stat_user_indexes counters were captured for this index.
      title: TableIndex
      additionalProperties: false
    querylane.console.v1alpha1.TablePartition:
      type: object
      properties:
        table:
          type: string
          title: table
          description: Output-only. Child partition table resource.
        displayName:
          type: string
          title: display_name
          description: Output-only. Display name of the partition table.
        partitionBound:
          type: string
          title: partition_bound
          description: Output-only. Bound expression for this child partition.
        estimatedRows:
          type:
            - integer
            - string
          title: estimated_rows
          format: int64
          description: Output-only. Estimated live rows for this child partition from PostgreSQL statistics.
        sizeBytes:
          type:
            - integer
            - string
          title: size_bytes
          format: int64
          description: Output-only. Total relation size in bytes for this child partition.
      title: TablePartition
      additionalProperties: false
      description: TablePartition describes one direct child partition.
    querylane.console.v1alpha1.TablePartitionMetadata:
      type: object
      properties:
        partitionKey:
          type: string
          title: partition_key
          description: |-
            Output-only. Partition key definition for a partitioned table, such as
             `RANGE (created_at)`. Empty when the table is not itself partitioned.
        partitionBound:
          type: string
          title: partition_bound
          description: |-
            Output-only. Bound expression when the selected table is a partition, such as
             `FOR VALUES FROM ('2024-01-01') TO ('2025-01-01')`.
        parentTable:
          type: string
          title: parent_table
          description: Output-only. Parent table resource when the selected table is a partition.
        childPartitions:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.TablePartition'
          title: child_partitions
          description: Output-only. Direct child partitions of the selected table.
        partitionCount:
          type: integer
          title: partition_count
          format: int32
          description: Output-only. Number of direct child partitions.
      title: TablePartitionMetadata
      additionalProperties: false
      description: TablePartitionMetadata describes PostgreSQL partitioning for one selected table.
    querylane.console.v1alpha1.TablePolicy:
      type: object
      properties:
        policyName:
          type: string
          title: policy_name
          description: Output-only. Policy name as defined in the database. This embedded metadata is not an AIP resource.
        mode:
          title: mode
          description: Output-only. Policy mode.
          $ref: '#/components/schemas/querylane.console.v1alpha1.PolicyMode'
        command:
          title: command
          description: Output-only. Command affected by the policy.
          $ref: '#/components/schemas/querylane.console.v1alpha1.PolicyCommand'
        roles:
          type: array
          items:
            type: string
          title: roles
          description: Output-only. Raw database role identifiers referenced by the policy, not AIP resource names.
        usingExpression:
          type: string
          title: using_expression
          description: Output-only. USING expression, if present.
        checkExpression:
          type: string
          title: check_expression
          description: Output-only. WITH CHECK expression, if present.
      title: TablePolicy
      additionalProperties: false
    querylane.console.v1alpha1.TableResultColumn:
      type: object
      properties:
        columnName:
          type: string
          title: column_name
          description: Output-only. Column name as returned by PostgreSQL. This is not an AIP resource name.
        dataType:
          title: data_type
          description: Output-only. High-level data type category.
          $ref: '#/components/schemas/querylane.console.v1alpha1.DataType'
        rawType:
          type: string
          title: raw_type
          description: Output-only. Engine-specific type name.
        isNullable:
          type: boolean
          title: is_nullable
          description: Output-only. Whether the column allows nulls.
        mayTruncate:
          type: boolean
          title: may_truncate
          description: |-
            Output-only. Hint that this column may be subject to PREVIEW truncation
             (text-family, jsonb, bytea, xml, large arrays).
      title: TableResultColumn
      additionalProperties: false
      description: TableResultColumn describes a plain result-set column. It is not a resource.
    querylane.console.v1alpha1.TableResultRow:
      type: object
      properties:
        values:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.TableCell'
          title: values
          description: Output-only. Values aligned with TableResultSet.columns.
        rowKey:
          type: string
          title: row_key
          description: |-
            Output-only. Reserved for the upcoming Update/Delete row APIs — will
             carry an HMAC-signed token bound to (table, identity_columns,
             identity_values, schema_version) once those APIs ship. Always empty
             in v1alpha1 reads; the field is in the proto so adopting the write
             API later does not require a wire change.
      title: TableResultRow
      additionalProperties: false
      description: TableResultRow represents a single row in a result set.
    querylane.console.v1alpha1.TableResultSet:
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.TableResultColumn'
          title: columns
          description: Output-only. Result columns in order.
        rows:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.TableResultRow'
          title: rows
          description: |-
            Output-only. Returned rows. May be fewer than ReadRowsRequest.page_size
             when max_response_bytes is reached; in that case next_page_token is set.
        rowCount:
          title: row_count
          description: Output-only. Always populated. status describes whether value is meaningful.
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowCount'
        rowIdentity:
          title: row_identity
          description: Output-only. How rows are identified (and thus how row_keys can be reused).
          $ref: '#/components/schemas/querylane.console.v1alpha1.RowIdentity'
        paginationStrategy:
          title: pagination_strategy
          description: Output-only. How this page was paged. Independent of row_identity.
          $ref: '#/components/schemas/querylane.console.v1alpha1.PaginationStrategy'
        observedAt:
          title: observed_at
          description: Output-only. Snapshot timestamp; same for every row in this page.
          type: string
          format: date-time
      title: TableResultSet
      additionalProperties: false
      description: TableResultSet is a complete result set with metadata.
    querylane.console.v1alpha1.TableTrigger:
      type: object
      properties:
        triggerName:
          type: string
          title: trigger_name
          description: Output-only. Trigger name as defined in the database. This embedded metadata is not an AIP resource.
        timing:
          type: string
          title: timing
          description: Output-only. Timing keyword (BEFORE, AFTER, INSTEAD OF).
        events:
          type: array
          items:
            type: string
          title: events
          description: Output-only. Event names such as INSERT, UPDATE, DELETE, TRUNCATE.
        functionName:
          type: string
          title: function_name
          description: Output-only. Raw trigger function or procedure database identifier, not an AIP resource name.
        enabled:
          type: boolean
          title: enabled
          description: Output-only. Whether the trigger is enabled.
        definition:
          type: string
          title: definition
          description: Output-only. Raw definition or normalized SQL snippet.
      title: TableTrigger
      additionalProperties: false
    querylane.console.v1alpha1.TableValue:
      type: object
      oneOf:
        - type: object
          properties:
            boolValue:
              type: boolean
              title: bool_value
          title: bool_value
          required:
            - boolValue
        - type: object
          properties:
            bytesValue:
              type: string
              title: bytes_value
              format: byte
          title: bytes_value
          required:
            - bytesValue
        - type: object
          properties:
            doubleValue:
              type: number
              title: double_value
              format: double
          title: double_value
          required:
            - doubleValue
        - type: object
          properties:
            int64Value:
              type:
                - integer
                - string
              title: int64_value
              format: int64
          title: int64_value
          required:
            - int64Value
        - type: object
          properties:
            jsonValue:
              type: string
              title: json_value
          title: json_value
          required:
            - jsonValue
        - type: object
          properties:
            nullValue:
              title: null_value
              $ref: '#/components/schemas/google.protobuf.NullValue'
          title: null_value
          required:
            - nullValue
        - type: object
          properties:
            numericValue:
              type: string
              title: numeric_value
          title: numeric_value
          required:
            - numericValue
        - type: object
          properties:
            stringValue:
              type: string
              title: string_value
          title: string_value
          required:
            - stringValue
        - type: object
          properties:
            timestampValue:
              type: string
              title: timestamp_value
          title: timestamp_value
          required:
            - timestampValue
      title: TableValue
      additionalProperties: false
      description: |-
        TableValue is a typed literal. Used in RowPredicate.values, in
         TableCell.value, and inside opaque token payloads. Has no preview
         metadata; preview metadata lives on TableCell.
    querylane.console.v1alpha1.TestInstanceConnectionRequest:
      type: object
      properties:
        config:
          title: config
          description: Required. PostgreSQL connection configuration to test.
          $ref: '#/components/schemas/querylane.console.v1alpha1.PostgresConfig'
      title: TestInstanceConnectionRequest
      required:
        - config
      additionalProperties: false
      description: '--- TestInstanceConnection RPC ---'
    querylane.console.v1alpha1.TestInstanceConnectionResponse:
      type: object
      title: TestInstanceConnectionResponse
      additionalProperties: false
    querylane.console.v1alpha1.TrendDelta:
      type: object
      properties:
        currentValue:
          type: number
          title: current_value
          format: double
          description: |-
            The representative value over the current window (e.g. the last connection
             count, or the mean TPS) — the number shown on the stat tile. NaN when the
             current window has no usable data (e.g. probes stopped).
        previousValue:
          type: number
          title: previous_value
          format: double
          description: |-
            The comparable value over the shifted window. NaN when previous_available
             is false.
        percentChange:
          type: number
          title: percent_change
          format: double
          description: |-
            The signed percent change from previous_value to current_value (e.g. 62.0
             for +62%). NaN when it cannot be computed: either window lacks data, or
             previous_value is zero while current_value is not (a rise from zero has no
             finite percentage).
        previousAvailable:
          type: boolean
          title: previous_available
          description: |-
            Whether the shifted window had any data. False for a target younger than
             the comparison offset, in which case the client should suppress the delta.
      title: TrendDelta
      additionalProperties: false
      description: |-
        TrendDelta is the scalar period-over-period trend for a series. Fields that
         could not be computed are NaN, mirroring the NaN-for-gap convention of
         Points.values; clients should suppress a NaN before rendering.
    querylane.console.v1alpha1.UpdateInstanceRequest:
      type: object
      properties:
        instance:
          title: instance
          description: |-
            Required. The instance record to update.
             Only the fields specified in update_mask are modified; unset fields are
             ignored.
          $ref: '#/components/schemas/querylane.console.v1alpha1.Instance'
        updateMask:
          title: update_mask
          description: |
            Required. The list of fields to be updated.
            update_mask_non_empty // update_mask must specify at least one field
          type: string
      title: UpdateInstanceRequest
      required:
        - updateMask
      additionalProperties: false
      description: |
        --- UpdateInstance RPC ---
        update_instance_name_required // instance.name is required to identify the resource
    querylane.console.v1alpha1.UpdateInstanceResponse:
      type: object
      properties:
        instance:
          title: instance
          $ref: '#/components/schemas/querylane.console.v1alpha1.Instance'
      title: UpdateInstanceResponse
      additionalProperties: false
    querylane.console.v1alpha1.View:
      type: object
      properties:
        name:
          type: string
          title: name
          description: Output-only identifier. The unique resource name of the view.
        displayName:
          type: string
          title: display_name
          description: Output-only. UI-friendly display name.
        viewType:
          title: view_type
          description: Output-only. Whether this is a standard or materialized view.
          $ref: '#/components/schemas/querylane.console.v1alpha1.View.ViewType'
        owner:
          type: string
          title: owner
          description: Output-only. View owner role.
        comment:
          type: string
          title: comment
          description: Output-only. Comment for the view, if any.
        isSystemView:
          type: boolean
          title: is_system_view
          description: Output-only. Whether this is a system view.
        definition:
          type: string
          title: definition
          description: Output-only. Definition of the view. Populated for VIEW_VIEW_FULL.
        sizeBytes:
          type:
            - integer
            - string
          title: size_bytes
          format: int64
          description: Output-only. Estimated size in bytes for materialized views, when known.
        rowCount:
          type:
            - integer
            - string
          title: row_count
          format: int64
          description: Output-only. Estimated row count for materialized views, when known.
        isPopulated:
          type: boolean
          title: is_populated
          description: Output-only. Whether a materialized view is populated.
        createTime:
          title: create_time
          description: Output-only. View creation time when available.
          type: string
          format: date-time
        lastDdlTime:
          title: last_ddl_time
          description: Output-only. Time of the last DDL change when available.
          type: string
          format: date-time
      title: View
      additionalProperties: false
      description: A View represents a standard or materialized view within a Schema.
    querylane.console.v1alpha1.View.ViewType:
      type: string
      title: ViewType
      enum:
        - VIEW_TYPE_UNSPECIFIED
        - VIEW_TYPE_STANDARD
        - VIEW_TYPE_MATERIALIZED
      description: The type of view object.
    querylane.console.v1alpha1.ViewView:
      type: string
      title: ViewView
      enum:
        - VIEW_VIEW_UNSPECIFIED
        - VIEW_VIEW_BASIC
        - VIEW_VIEW_FULL
      description: ViewView controls how much detail the server should populate for View resources.
    querylane.console.v1alpha1.WatchConfigChangesRequest:
      type: object
      title: WatchConfigChangesRequest
      additionalProperties: false
    querylane.console.v1alpha1.WatchConfigChangesResponse:
      type: object
      properties:
        event:
          title: event
          description: Output-only. The progress event for the current step.
          $ref: '#/components/schemas/querylane.console.v1alpha1.SetupProgressEvent'
      title: WatchConfigChangesResponse
      additionalProperties: false
security: []
tags:
  - name: AdminService
    description: |-
      AdminService exposes operational introspection of querylane's own backend:
       live replicas, the background runner job queue including lease ownership,
       raw catalog sync state, and metrics sample storage. It is a debugging
       surface for operators ("why don't my metrics show up?") and is not yet
       gated by authorization; once authn/authz lands, access will be restricted
       to admins at the service level.
  - name: ConsoleService
    description: |-
      ConsoleService provides methods to retrieve metadata about the Querylane
       Console application itself.
  - name: DatabaseService
    description: |-
      Service for managing databases within registered Instances.
       This service provides access to database metadata for building
       visual database browsers and workspace tools.
  - name: ExtensionService
    description: Service for viewing PostgreSQL extensions available in a database.
  - name: InstanceService
    description: Service for managing connection records to external database instances.
  - name: MetricsService
    description: |-
      MetricsService serves the time series collected by querylane's background
       sampling probes, turned into chart-ready shape: samples are bucketed to a
       requested resolution, cumulative counters are converted to per-second rates,
       and an optional period-over-period trend delta is computed server-side.

       It is a read API over the meta database's sample tables; it never touches the
       managed instances. The live single-point equivalents live on
       InstanceService.GetInstanceOverview.
  - name: OnboardingService
    description: |-
      OnboardingService guides first-time users through configuring the application
       database. It exposes the available setup methods, executes setup, and streams
       real-time progress events back to the client.
  - name: RoleService
    description: |-
      Service for viewing PostgreSQL roles available on a registered Instance,
       including direct memberships sourced from pg_auth_members.
  - name: RunnerService
    description: |-
      RunnerService exposes the scheduling state of querylane's background jobs:
       the sampling probes and maintenance jobs that run against registered
       instances. It answers "is sampling healthy?" — which probes ran, when they
       last succeeded per target, and what the last failure was.
  - name: SchemaService
    description: Service for managing schemas within databases.
  - name: TableService
    description: Service for managing tables within schemas.
  - name: TableDataService
    description: |-
      TableDataService exposes live row reads against a single Table resource.

       Methods are AIP-136 custom methods on the Table resource — requests use
       `name`, not `parent`. Distinct from TableService (catalog) and SQLService
       (ad-hoc SQL) because the three surfaces have different cost, timeout,
       pooling, and authorization profiles.
  - name: SQLService
    description: |-
      SQLService exposes ad-hoc read-only query execution.
       This is intended for the SQL editor, not for grid-style table browsing.
  - name: ViewService
    description: ViewService exposes views as a separate resource hierarchy.
