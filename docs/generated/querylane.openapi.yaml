components:
  schemas:
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/connect.error_details.Any'
          description: A list of messages that carry the error details. There is no limit on the number of messages.
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    connect.error_details.Any:
      type: object
      properties:
        type:
          type: string
          description: 'A URL that acts as a globally unique identifier for the type of the serialized message. For example: `type.googleapis.com/google.rpc.ErrorInfo`. This is used to determine the schema of the data in the `value` field and is the discriminator for the `debug` field.'
        value:
          type: string
          format: binary
          description: The Protobuf message, serialized as bytes and base64-encoded. The specific message type is identified by the `type` field.
        debug:
          oneOf:
            - type: object
              title: Any
              additionalProperties: true
              description: Detailed error information.
          discriminator:
            propertyName: type
          title: Debug
          description: Deserialized error detail payload. The 'type' field indicates the schema. This field is for easier debugging and should not be relied upon for application logic.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message, with an additional debug field for ConnectRPC error details.
    google.protobuf.Any:
      type: object
      properties:
        type:
          type: string
        value:
          type: string
          format: binary
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
    google.protobuf.Duration:
      type: string
      format: duration
      description: |-
        A Duration represents a signed, fixed-length span of time represented
         as a count of seconds and fractions of seconds at nanosecond
         resolution. It is independent of any calendar and concepts like "day"
         or "month". It is related to Timestamp in that the difference between
         two Timestamp values is a Duration and it can be added or subtracted
         from a Timestamp. Range is approximately +-10,000 years.

         # Examples

         Example 1: Compute Duration from two Timestamps in pseudo code.

             Timestamp start = ...;
             Timestamp end = ...;
             Duration duration = ...;

             duration.seconds = end.seconds - start.seconds;
             duration.nanos = end.nanos - start.nanos;

             if (duration.seconds < 0 && duration.nanos > 0) {
               duration.seconds += 1;
               duration.nanos -= 1000000000;
             } else if (duration.seconds > 0 && duration.nanos < 0) {
               duration.seconds -= 1;
               duration.nanos += 1000000000;
             }

         Example 2: Compute Timestamp from Timestamp + Duration in pseudo code.

             Timestamp start = ...;
             Duration duration = ...;
             Timestamp end = ...;

             end.seconds = start.seconds + duration.seconds;
             end.nanos = start.nanos + duration.nanos;

             if (end.nanos < 0) {
               end.seconds -= 1;
               end.nanos += 1000000000;
             } else if (end.nanos >= 1000000000) {
               end.seconds += 1;
               end.nanos -= 1000000000;
             }

         Example 3: Compute Duration from datetime.timedelta in Python.

             td = datetime.timedelta(days=3, minutes=10)
             duration = Duration()
             duration.FromTimedelta(td)

         # JSON Mapping

         In JSON format, the Duration type is encoded as a string rather than an
         object, where the string ends in the suffix "s" (indicating seconds) and
         is preceded by the number of seconds, with nanoseconds expressed as
         fractional seconds. For example, 3 seconds with 0 nanoseconds should be
         encoded in JSON format as "3s", while 3 seconds and 1 nanosecond should
         be expressed in JSON format as "3.000000001s", and 3 seconds and 1
         microsecond should be expressed in JSON format as "3.000001s".
    google.protobuf.FieldMask:
      type: string
      description: |-
        `FieldMask` represents a set of symbolic field paths, for example:

             paths: "f.a"
             paths: "f.b.d"

         Here `f` represents a field in some root message, `a` and `b`
         fields in the message found in `f`, and `d` a field found in the
         message in `f.b`.

         Field masks are used to specify a subset of fields that should be
         returned by a get operation or modified by an update operation.
         Field masks also have a custom JSON encoding (see below).

         # Field Masks in Projections

         When used in the context of a projection, a response message or
         sub-message is filtered by the API to only contain those fields as
         specified in the mask. For example, if the mask in the previous
         example is applied to a response message as follows:

             f {
               a : 22
               b {
                 d : 1
                 x : 2
               }
               y : 13
             }
             z: 8

         The result will not contain specific values for fields x,y and z
         (their value will be set to the default, and omitted in proto text
         output):


             f {
               a : 22
               b {
                 d : 1
               }
             }

         A repeated field is not allowed except at the last position of a
         paths string.

         If a FieldMask object is not present in a get operation, the
         operation applies to all fields (as if a FieldMask of all fields
         had been specified).

         Note that a field mask does not necessarily apply to the
         top-level response message. In case of a REST get operation, the
         field mask applies directly to the response, but in case of a REST
         list operation, the mask instead applies to each individual message
         in the returned resource list. In case of a REST custom method,
         other definitions may be used. Where the mask applies will be
         clearly documented together with its declaration in the API.  In
         any case, the effect on the returned resource/resources is required
         behavior for APIs.

         # Field Masks in Update Operations

         A field mask in update operations specifies which fields of the
         targeted resource are going to be updated. The API is required
         to only change the values of the fields as specified in the mask
         and leave the others untouched. If a resource is passed in to
         describe the updated values, the API ignores the values of all
         fields not covered by the mask.

         If a repeated field is specified for an update operation, new values will
         be appended to the existing repeated field in the target resource. Note that
         a repeated field is only allowed in the last position of a `paths` string.

         If a sub-message is specified in the last position of the field mask for an
         update operation, then new value will be merged into the existing sub-message
         in the target resource.

         For example, given the target message:

             f {
               b {
                 d: 1
                 x: 2
               }
               c: [1]
             }

         And an update message:

             f {
               b {
                 d: 10
               }
               c: [2]
             }

         then if the field mask is:

          paths: ["f.b", "f.c"]

         then the result will be:

             f {
               b {
                 d: 10
                 x: 2
               }
               c: [1, 2]
             }

         An implementation may provide options to override this default behavior for
         repeated and message fields.

         In order to reset a field's value to the default, the field must
         be in the mask and set to the default value in the provided resource.
         Hence, in order to reset all fields of a resource, provide a default
         instance of the resource and set all fields in the mask, or do
         not provide a mask as described below.

         If a field mask is not present on update, the operation applies to
         all fields (as if a field mask of all fields has been specified).
         Note that in the presence of schema evolution, this may mean that
         fields the client does not know and has therefore not filled into
         the request will be reset to their default. If this is unwanted
         behavior, a specific service may require a client to always specify
         a field mask, producing an error if not.

         As with get operations, the location of the resource which
         describes the updated values in the request message depends on the
         operation kind. In any case, the effect of the field mask is
         required to be honored by the API.

         ## Considerations for HTTP REST

         The HTTP kind of an update operation which uses a field mask must
         be set to PATCH instead of PUT in order to satisfy HTTP semantics
         (PUT must only be used for full updates).

         # JSON Encoding of Field Masks

         In JSON, a field mask is encoded as a single string where paths are
         separated by a comma. Fields name in each path are converted
         to/from lower-camel naming conventions.

         As an example, consider the following message declarations:

             message Profile {
               User user = 1;
               Photo photo = 2;
             }
             message User {
               string display_name = 1;
               string address = 2;
             }

         In proto a field mask for `Profile` may look as such:

             mask {
               paths: "user.display_name"
               paths: "photo"
             }

         In JSON, the same mask is represented as below:

             {
               mask: "user.displayName,photo"
             }

         # Field Masks and Oneof Fields

         Field masks treat fields in oneofs just as regular fields. Consider the
         following message:

             message SampleMessage {
               oneof test_oneof {
                 string name = 4;
                 SubMessage sub_message = 9;
               }
             }

         The field mask can be:

             mask {
               paths: "name"
             }

         Or:

             mask {
               paths: "sub_message"
             }

         Note that oneof type names ("test_oneof" in this case) cannot be used in
         paths.

         ## Field Mask Verification

         The implementation of any API method which has a FieldMask type field in the
         request should verify the included field paths, and return an
         `INVALID_ARGUMENT` error if any path is unmappable.
    google.protobuf.NullValue:
      type: string
      title: NullValue
      enum:
        - NULL_VALUE
      description: |-
        `NullValue` is a singleton enumeration to represent the null value for the
         `Value` type union.

         The JSON representation for `NullValue` is JSON `null`.
    google.protobuf.Timestamp:
      type: string
      examples:
        - "2023-01-15T01:30:15.01Z"
        - "2024-12-25T12:00:00Z"
      format: date-time
      description: |-
        A Timestamp represents a point in time independent of any time zone or local
         calendar, encoded as a count of seconds and fractions of seconds at
         nanosecond resolution. The count is relative to an epoch at UTC midnight on
         January 1, 1970, in the proleptic Gregorian calendar which extends the
         Gregorian calendar backwards to year one.

         All minutes are 60 seconds long. Leap seconds are "smeared" so that no leap
         second table is needed for interpretation, using a [24-hour linear
         smear](https://developers.google.com/time/smear).

         The range is from 0001-01-01T00:00:00Z to 9999-12-31T23:59:59.999999999Z. By
         restricting to that range, we ensure that we can convert to and from [RFC
         3339](https://www.ietf.org/rfc/rfc3339.txt) date strings.

         # Examples

         Example 1: Compute Timestamp from POSIX `time()`.

             Timestamp timestamp;
             timestamp.set_seconds(time(NULL));
             timestamp.set_nanos(0);

         Example 2: Compute Timestamp from POSIX `gettimeofday()`.

             struct timeval tv;
             gettimeofday(&tv, NULL);

             Timestamp timestamp;
             timestamp.set_seconds(tv.tv_sec);
             timestamp.set_nanos(tv.tv_usec * 1000);

         Example 3: Compute Timestamp from Win32 `GetSystemTimeAsFileTime()`.

             FILETIME ft;
             GetSystemTimeAsFileTime(&ft);
             UINT64 ticks = (((UINT64)ft.dwHighDateTime) << 32) | ft.dwLowDateTime;

             // A Windows tick is 100 nanoseconds. Windows epoch 1601-01-01T00:00:00Z
             // is 11644473600 seconds before Unix epoch 1970-01-01T00:00:00Z.
             Timestamp timestamp;
             timestamp.set_seconds((INT64) ((ticks / 10000000) - 11644473600LL));
             timestamp.set_nanos((INT32) ((ticks % 10000000) * 100));

         Example 4: Compute Timestamp from Java `System.currentTimeMillis()`.

             long millis = System.currentTimeMillis();

             Timestamp timestamp = Timestamp.newBuilder().setSeconds(millis / 1000)
                 .setNanos((int) ((millis % 1000) * 1000000)).build();

         Example 5: Compute Timestamp from Java `Instant.now()`.

             Instant now = Instant.now();

             Timestamp timestamp =
                 Timestamp.newBuilder().setSeconds(now.getEpochSecond())
                     .setNanos(now.getNano()).build();

         Example 6: Compute Timestamp from current time in Python.

             timestamp = Timestamp()
             timestamp.GetCurrentTime()

         # JSON Mapping

         In JSON format, the Timestamp type is encoded as a string in the
         [RFC 3339](https://www.ietf.org/rfc/rfc3339.txt) format. That is, the
         format is "{year}-{month}-{day}T{hour}:{min}:{sec}[.{frac_sec}]Z"
         where {year} is always expressed using four digits while {month}, {day},
         {hour}, {min}, and {sec} are zero-padded to two digits each. The fractional
         seconds, which can go up to 9 digits (i.e. up to 1 nanosecond resolution),
         are optional. The "Z" suffix indicates the timezone ("UTC"); the timezone
         is required. A proto3 JSON serializer should always use UTC (as indicated by
         "Z") when printing the Timestamp type and a proto3 JSON parser should be
         able to accept both UTC and other timezones (as indicated by an offset).

         For example, "2017-01-15T01:30:15.01Z" encodes 15.01 seconds past
         01:30 UTC on January 15, 2017.

         In JavaScript, one can convert a Date object to this format using the
         standard
         [toISOString()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/toISOString)
         method. In Python, a standard `datetime.datetime` object can be converted
         to this format using
         [`strftime`](https://docs.python.org/2/library/time.html#time.strftime) with
         the time format spec '%Y-%m-%dT%H:%M:%S.%fZ'. Likewise, in Java, one can use
         the Joda Time's [`ISODateTimeFormat.dateTime()`](
         http://joda-time.sourceforge.net/apidocs/org/joda/time/format/ISODateTimeFormat.html#dateTime()
         ) to obtain a formatter capable of generating timestamps in this format.
    google.rpc.Status:
      type: object
      properties:
        code:
          type: integer
          title: code
          format: int32
          description: |-
            The status code, which should be an enum value of
             [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          title: message
          description: |-
            A developer-facing error message, which should be in English. Any
             user-facing error message should be localized and sent in the
             [google.rpc.Status.details][google.rpc.Status.details] field, or localized
             by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/google.protobuf.Any'
          title: details
          description: |-
            A list of messages that carry the error details.  There is a common set of
             message types for APIs to use.
      title: Status
      additionalProperties: false
      description: |-
        The `Status` type defines a logical error model that is suitable for
         different programming environments, including REST APIs and RPC APIs. It is
         used by [gRPC](https://github.com/grpc). Each `Status` message contains
         three pieces of data: error code, error message, and error details.

         You can find out more about this error model and how to work with it in the
         [API Design Guide](https://cloud.google.com/apis/design/errors).
    google.type.Interval:
      type: object
      properties:
        startTime:
          title: start_time
          description: |-
            Optional. Inclusive start of the interval.

             If specified, a Timestamp matching this interval will have to be the same
             or after the start.
          type: string
          format: date-time
        endTime:
          title: end_time
          description: |-
            Optional. Exclusive end of the interval.

             If specified, a Timestamp matching this interval will have to be before the
             end.
          type: string
          format: date-time
      title: Interval
      additionalProperties: false
      description: |-
        Represents a time interval, encoded as a Timestamp start (inclusive) and a
         Timestamp end (exclusive).

         The start must be less than or equal to the end.
         When the start equals the end, the interval is empty (matches no time).
         When both start and end are unspecified, the interval matches any time.
    querylane.console.v1alpha1.AdminRunnerExecution:
      type: object
      properties:
        runnerName:
          type: string
          title: runner_name
          description: |-
            Output-only. The runner this state belongs to (e.g. "probe_cache",
             "instance_connectivity", "sample_retention").
        target:
          type: string
          title: target
          description: |-
            Output-only. The target the runner executes against, as an AIP resource
             name: "instances/{instance}" for instance-level runners,
             "instances/{instance}/databases/{database}" for database-level runners,
             or "meta" for jobs operating on querylane's own database.
        leaseHeld:
          type: boolean
          title: lease_held
          description: |-
            Output-only. Whether a replica currently holds the execution lease
             (a run is in flight right now).
        leaseOwner:
          title: lease_owner
          description: Output-only. The replica holding the lease. Unset when no live lease.
          $ref: '#/components/schemas/querylane.console.v1alpha1.ReplicaIdentity'
        leaseExpiresAt:
          title: lease_expires_at
          description: |-
            Output-only. When the currently held lease expires. Unset when no live
             lease.
          type: string
          format: date-time
        lastStartedAt:
          title: last_started_at
          description: Output-only. When the most recent run started.
          type: string
          format: date-time
        lastFinishedAt:
          title: last_finished_at
          description: Output-only. When the most recent run finished, successfully or not.
          type: string
          format: date-time
        lastSuccessAt:
          title: last_success_at
          description: |-
            Output-only. When the runner last completed successfully for this
             target.
          type: string
          format: date-time
        lastError:
          type: string
          title: last_error
          description: |-
            Output-only. The most recent infrastructure failure, empty after a
             successful run.
      title: AdminRunnerExecution
      additionalProperties: false
      description: |-
        AdminRunnerExecution is the scheduling state of one background runner
         against one target, including lease ownership. Superset of
         RunnerService's RunnerExecution.
    querylane.console.v1alpha1.AppDatabaseStatus:
      type: object
      properties:
        state:
          title: state
          description: Output-only. Current state of the application database.
          $ref: '#/components/schemas/querylane.console.v1alpha1.AppDatabaseStatus.State'
        error:
          type: string
          title: error
          description: Output-only. Error message when state is STATE_ERROR, empty otherwise.
        schemaVersion:
          type: integer
          title: schema_version
          description: Output-only. The current schema migration version number.
      title: AppDatabaseStatus
      additionalProperties: false
      description: AppDatabaseStatus describes the current state of the application's metadata database.
    querylane.console.v1alpha1.AppDatabaseStatus.State:
      type: string
      title: State
      enum:
        - STATE_UNSPECIFIED
        - STATE_NOT_CONFIGURED
        - STATE_READY
        - STATE_ERROR
      description: State represents the lifecycle state of the application database.
    querylane.console.v1alpha1.ApplicationConnections:
      type: object
      properties:
        applicationName:
          type: string
          title: application_name
          description: The reporting application_name; '(unnamed)' when the backend set none.
        activeConnections:
          type: integer
          title: active_connections
          minimum: 0
          format: int32
        idleConnections:
          type: integer
          title: idle_connections
          minimum: 0
          format: int32
        idleInTransactionConnections:
          type: integer
          title: idle_in_transaction_connections
          minimum: 0
          format: int32
        totalConnections:
          type: integer
          title: total_connections
          minimum: 0
          format: int32
      title: ApplicationConnections
      additionalProperties: false
      description: Client backend connection counts for one application_name, split by state.
    querylane.console.v1alpha1.AutovacuumHealth:
      type: object
      properties:
        status:
          title: status
          $ref: '#/components/schemas/querylane.console.v1alpha1.HealthCheckStatus'
        summary:
          type: string
          title: summary
        runningWorkers:
          type: integer
          title: running_workers
          minimum: 0
          format: int32
        maxWorkers:
          type: integer
          title: max_workers
          minimum: 0
          format: int32
        lastAutovacuumAt:
          title: last_autovacuum_at
          description: |-
            Most recent autovacuum/autoanalyze across the CONNECTED database's tables.
             Unset when nothing has been auto-maintained yet. Not cluster-wide.
          type: string
          format: date-time
      title: AutovacuumHealth
      additionalProperties: false
      description: |-
        Autovacuum worker saturation and most recent auto-maintenance activity from
         pg_stat_activity and pg_stat_all_tables.
    querylane.console.v1alpha1.BuildInfo:
      type: object
      properties:
        version:
          type: string
          title: version
          description: Output-only. The official version string, e.g., "v1.2.3".
        gitCommit:
          type: string
          title: git_commit
          description: Output-only. The git commit SHA the binary was built from.
        builtAt:
          title: built_at
          description: Output-only. The timestamp when the binary was built.
          type: string
          format: date-time
        gitBranch:
          type: string
          title: git_branch
          description: Output-only. The git branch the binary was built from.
      title: BuildInfo
      additionalProperties: false
      description: Contains version and build information for the application.
    querylane.console.v1alpha1.CacheMetrics:
      type: object
      properties:
        hitRatio:
          type: number
          title: hit_ratio
          maximum: 1
          minimum: 0
          format: double
          description: Instance-wide buffer cache hit ratio (0.0–1.0).
        blocksHit:
          type:
            - integer
            - string
          title: blocks_hit
          minimum: 0
          format: int64
          description: Total shared buffer cache hits since last stats reset.
        blocksRead:
          type:
            - integer
            - string
          title: blocks_read
          minimum: 0
          format: int64
          description: Total disk block reads since last stats reset.
      title: CacheMetrics
      additionalProperties: false
      description: |
        Buffer cache performance metrics aggregated across all databases.
        cache_empty_ratio_zero // hit_ratio must be zero when no cache blocks were observed
    querylane.console.v1alpha1.CatalogSyncMetadata:
      type: object
      properties:
        syncStatus:
          title: sync_status
          description: Output-only. Current sync status for the listed catalog scope.
          $ref: '#/components/schemas/querylane.console.v1alpha1.CatalogSyncStatus'
        lastSyncedAt:
          title: last_synced_at
          description: Output-only. Last time the listed scope completed a successful sync.
          type: string
          format: date-time
        isStale:
          type: boolean
          title: is_stale
          description: Output-only. Whether the returned data may be stale.
        syncError:
          type: string
          title: sync_error
          description: Output-only. Last sync error, when sync_status is ERROR.
      title: CatalogSyncMetadata
      additionalProperties: false
      description: |-
        CatalogSyncMetadata describes whether a list response came from fresh,
         stale, syncing, or degraded cached catalog data.
    querylane.console.v1alpha1.CatalogSyncState:
      type: object
      properties:
        scope:
          type: string
          title: scope
          description: Output-only. The cached scope, e.g. "instances/{instance}/databases".
        status:
          title: status
          description: Output-only. Current sync status of the scope.
          $ref: '#/components/schemas/querylane.console.v1alpha1.CatalogSyncStatus'
        lastSyncedAt:
          title: last_synced_at
          description: Output-only. Last time the scope completed a successful sync.
          type: string
          format: date-time
        syncError:
          type: string
          title: sync_error
          description: |-
            Output-only. Raw error from the last failed sync attempt. Not
             sanitized: this is an operator-facing debugging surface.
        updatedAt:
          title: updated_at
          description: Output-only. When the sync state row last changed.
          type: string
          format: date-time
      title: CatalogSyncState
      additionalProperties: false
      description: |-
        CatalogSyncState is the raw sync bookkeeping of one cached catalog scope.
         Unlike the user-facing CatalogSyncMetadata, errors are surfaced verbatim.
    querylane.console.v1alpha1.CatalogSyncStatus:
      type: string
      title: CatalogSyncStatus
      enum:
        - CATALOG_SYNC_STATUS_UNSPECIFIED
        - CATALOG_SYNC_STATUS_NEVER_SYNCED
        - CATALOG_SYNC_STATUS_SYNCING
        - CATALOG_SYNC_STATUS_SYNCED
        - CATALOG_SYNC_STATUS_ERROR
      description: CatalogSyncStatus describes freshness of a cached catalog scope.
    querylane.console.v1alpha1.CellValueMode:
      type: string
      title: CellValueMode
      enum:
        - CELL_VALUE_MODE_UNSPECIFIED
        - CELL_VALUE_MODE_PREVIEW
        - CELL_VALUE_MODE_FULL
      description: Controls per-cell payload size.
    querylane.console.v1alpha1.CheckInstanceActivityRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          pattern: ^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?$
          description: |-
            Required. Resource name of the instance.
             Format: instances/{instance_id}
      title: CheckInstanceActivityRequest
      required:
        - name
      additionalProperties: false
      description: '--- CheckInstanceActivity RPC ---'
    querylane.console.v1alpha1.CheckInstanceActivityResponse:
      type: object
      properties:
        activity:
          title: activity
          $ref: '#/components/schemas/querylane.console.v1alpha1.ConnectionActivityHealth'
        partialErrors:
          type: array
          items:
            $ref: '#/components/schemas/google.rpc.Status'
          title: partial_errors
          description: |-
            Errors encountered fetching connection activity. The RPC succeeds (OK)
             when activity is unavailable so the page can show the category reason.
             ErrorInfo metadata key "check" is "connection_activity".
      title: CheckInstanceActivityResponse
      additionalProperties: false
    querylane.console.v1alpha1.CheckInstanceHealthRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          pattern: ^instances/[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?$
          description: |-
            Required. Resource name of the instance.
             Format: instances/{instance_id}
      title: CheckInstanceHealthRequest
      required:
        - name
      additionalProperties: false
      description: '--- CheckInstanceHealth RPC ---'
    querylane.console.v1alpha1.CheckInstanceHealthResponse:
      type: object
      properties:
        health:
          title: health
          $ref: '#/components/schemas/querylane.console.v1alpha1.InstanceHealth'
        partialErrors:
          type: array
          items:
            $ref: '#/components/schemas/google.rpc.Status'
          title: partial_errors
          description: |-
            Errors encountered fetching individual health categories.
             The RPC succeeds (OK) even when some categories are unavailable.
             Each Status identifies the failed category via google.rpc.ErrorInfo
             in its details, with metadata key "check" set to the category name
             (one of: "connection_activity", "replication", "stats_access",
             "pg_stat_statements", "autovacuum").
      title: CheckInstanceHealthResponse
      additionalProperties: false
    querylane.console.v1alpha1.Column:
      type: object
      properties:
        columnName:
          type: string
          title: column_name
          description: Output-only. Column name as defined in the database. This is not an AIP resource name.
        ordinalPosition:
          type: integer
          title: ordinal_position
          format: int32
          description: Output-only. The position of the column within the table (1-based).
        dataType:
          title: data_type
          description: Output-only. The high-level data type category for UI rendering.
          $ref: '#/components/schemas/querylane.console.v1alpha1.DataType'
        rawType:
          type: string
          title: raw_type
          description: Output-only. The PostgreSQL type name (e.g., "character varying", "integer", "jsonb").
        isNullable:
          type: boolean
          title: is_nullable
          description: Output-only. Whether the column allows NULL values.
        isPrimaryKey:
          type: boolean
          title: is_primary_key
          description: Output-only. Whether the column is part of the primary key.
        defaultValue:
          type: string
          title: default_value
          description: |-
            Output-only. The default value expression for the column, if any.
             This is the raw SQL expression (e.g., "nextval('seq'::regclass)", "'active'::text").
        characterMaximumLength:
          type: integer
          title: character_maximum_length
          format: int32
          description: |-
            Output-only. The maximum character length for character types (e.g., varchar(255) → 255).
             Zero if not applicable to the column type.
        comment:
          type: string
          title: comment
          description: |-
            Output-only. User-provided comment or description for the column.
             May be empty if no comment was set.
        isUnique:
          type: boolean
          title: is_unique
          description: Output-only. Whether the column has a unique constraint.
        isGenerated:
          type: boolean
          title: is_generated
          description: Output-only. Whether the column is a generated column.
        generationExpression:
          type: string
          title: generation_expression
          description: Output-only. The generation expression for generated columns, if applicable.
        isIdentity:
          type: boolean
          title: is_identity
          description: Output-only. Whether the column is an identity column.
        identityGeneration:
          title: identity_generation
          description: Output-only. The identity generation strategy, if applicable.
          $ref: '#/components/schemas/querylane.console.v1alpha1.IdentityGeneration'
      title: Column
      additionalProperties: false
      description: A Column is bounded table metadata embedded in ListTableColumnsResponse. It is not a resource.
    querylane.console.v1alpha1.ConnectionActivityHealth:
      type: object
      properties:
        status:
          title: status
          $ref: '#/components/schemas/querylane.console.v1alpha1.HealthCheckStatus'
        summary:
          type: string
          title: summary
        activeConnections:
          type: integer
          title: active_connections
          minimum: 0
          format: int32
        idleConnections:
          type: integer
          title: idle_connections
          minimum: 0
          format: int32
        idleInTransactionConnections:
          type: integer
          title: idle_in_transaction_connections
          minimum: 0
          format: int32
        totalConnections:
          type: integer
          title: total_connections
          minimum: 0
          format: int32
        maxConnections:
          type: integer
          title: max_connections
          minimum: 0
          format: int32
        utilizationRatio:
          type: number
          title: utilization_ratio
          maximum: 1
          minimum: 0
          format: double
        waitingForLockConnections:
          type: integer
          title: waiting_for_lock_connections
          minimum: 0
          format: int32
        longRunningTransactionConnections:
          type: integer
          title: long_running_transaction_connections
          minimum: 0
          format: int32
        longestTransactionSeconds:
          type:
            - integer
            - string
          title: longest_transaction_seconds
          minimum: 0
          format: int64
        byApplication:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.ApplicationConnections'
          title: by_application
          description: |-
            Current client backends grouped by application_name (top talkers first,
             capped). A live snapshot with no historical backing. Empty when the
             breakdown could not be computed; the scalar counts above stay authoritative.
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.ConnectionActivitySession'
          title: sessions
          description: |-
            Current client backends from pg_stat_activity (risk-first, capped). Empty
             when the session query could not be computed; the scalar counts above stay
             authoritative.
      title: ConnectionActivityHealth
      additionalProperties: false
      description: Backend activity and connection pressure from pg_stat_activity.
    querylane.console.v1alpha1.ConnectionActivitySession:
      type: object
      properties:
        pid:
          type: integer
          title: pid
          minimum: 0
          format: int32
        username:
          type: string
          title: username
        applicationName:
          type: string
          title: application_name
        databaseName:
          type: string
          title: database_name
        state:
          type: string
          title: state
        durationSeconds:
          type:
            - integer
            - string
          title: duration_seconds
          minimum: 0
          format: int64
        query:
          type: string
          title: query
        waitEventType:
          type: string
          title: wait_event_type
        waitEvent:
          type: string
          title: wait_event
        blockedByPid:
          type: integer
          title: blocked_by_pid
          minimum: 0
          format: int32
        backendAgeSeconds:
          type:
            - integer
            - string
          title: backend_age_seconds
          minimum: 0
          format: int64
          description: Seconds since backend_start; how long this client has been connected.
        transactionAgeSeconds:
          type:
            - integer
            - string
            - "null"
          title: transaction_age_seconds
          minimum: 0
          format: int64
          description: Seconds since xact_start. Unset when no transaction is open.
        queryAgeSeconds:
          type:
            - integer
            - string
            - "null"
          title: query_age_seconds
          minimum: 0
          format: int64
          description: |-
            Seconds since query_start: the current query's age for active sessions,
             the most recent query's otherwise. Unset when none was run yet.
        clientAddress:
          type: string
          title: client_address
          description: |-
            Client origin from client_addr/client_port. Empty address and zero port
             when the client connected via unix socket.
        clientPort:
          type: integer
          title: client_port
          minimum: 0
          format: int32
      title: ConnectionActivitySession
      additionalProperties: false
      description: One live pg_stat_activity client backend row.
    querylane.console.v1alpha1.ConnectionMetrics:
      type: object
      properties:
        activeConnections:
          type: integer
          title: active_connections
          minimum: 0
          format: int32
          description: Number of backends currently executing a query.
        idleConnections:
          type: integer
          title: idle_connections
          minimum: 0
          format: int32
          description: Number of backends connected but idle.
        totalConnections:
          type: integer
          title: total_connections
          minimum: 0
          format: int32
          description: Total number of backends across all states.
        maxConnections:
          type: integer
          title: max_connections
          minimum: 0
          format: int32
          description: Server's max_connections setting.
      title: ConnectionMetrics
      additionalProperties: false
      description: |
        Connection utilization metrics queried from pg_stat_activity.
        connection_active_idle_not_above_total // active_connections and idle_connections must not exceed total_connections
        connection_total_not_above_max // total_connections must not exceed max_connections
    querylane.console.v1alpha1.ConstraintType:
      type: string
      title: ConstraintType
      enum:
        - CONSTRAINT_TYPE_UNSPECIFIED
        - CONSTRAINT_TYPE_PRIMARY_KEY
        - CONSTRAINT_TYPE_UNIQUE
        - CONSTRAINT_TYPE_FOREIGN_KEY
        - CONSTRAINT_TYPE_CHECK
        - CONSTRAINT_TYPE_EXCLUSION
    querylane.console.v1alpha1.CreateInstanceRequest:
      type: object
      properties:
        spec:
          title: spec
          description: |-
            Optional. Compatibility request body for creating an instance.
             Prefer `instance` for new clients. Exactly one of `spec` or `instance`
             must be set.
          $ref: '#/components/schemas/querylane.console.v1alpha1.CreateInstanceSpec'
        instanceId:
          type: string
          title: instance_id
          maxLength: 63
          minLength: 1
          pattern: ^[a-zA-Z]([a-zA-Z0-9_-]*[a-zA-Z0-9])?$
          description: Optional. The ID to use for the instance record.
        validateOnly:
          type: boolean
          title: validate_only
          description: Optional. If true, validates the connection but does not create the instance.
        instance:
          title: instance
          description: |-
            Optional. The instance resource to create. The server ignores `instance.name`
             and composes the full resource name from `instance_id`.
             Exactly one of `spec` or `instance` must be set.
          $ref: '#/components/schemas/querylane.console.v1alpha1.Instance'
      title: CreateInstanceRequest
      additionalProperties: false
      description: |
        --- CreateInstance RPC ---
        create_instance_body_exactly_one // exactly one of spec or instance must be set
    querylane.console.v1alpha1.CreateInstanceResponse:
      type: object
      properties:
        instance:
          title: instance
          $ref: '#/components/schemas/querylane.console.v1alpha1.Instance'
      title: CreateInstanceResponse
      additionalProperties: false
    querylane.console.v1alpha1.CreateInstanceSpec:
      type: object
      properties:
        displayName:
          type: string
          title: display_name
          maxLength: 63
          minLength: 1
          description: Required. A user-friendly name for the instance.
        labels:
          type: object
          title: labels
          maxProperties: 64
          additionalProperties:
            type: string
            title: value
            maxLength: 255
          description: |-
            Optional. Labels for organizing and filtering instances.
             Keys and values must be valid label format, max 64 labels.
        config:
          title: config
          description: Required. PostgreSQL connection configuration for this instance.
          $ref: '#/components/schemas/querylane.console.v1alpha1.PostgresConfig'
      title: CreateInstanceSpec
      required:
        - displayName
        - config
      additionalProperties: false
      description: |-
        CreateInstanceSpec defines the client-settable fields for creating an instance.
         This message contains only the fields that can be provided by clients during creation,
         with strict validation to catch errors as early as possible.
    querylane.console.v1alpha1.CreateInstanceSpec.LabelsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: LabelsEntry
      additionalProperties: false
    querylane.console.v1alpha1.DataType:
      type: string
      title: DataType
      enum:
        - DATA_TYPE_UNSPECIFIED
        - DATA_TYPE_STRING
        - DATA_TYPE_INTEGER
        - DATA_TYPE_FLOAT
        - DATA_TYPE_BOOLEAN
        - DATA_TYPE_DATE
        - DATA_TYPE_BINARY
        - DATA_TYPE_JSON
        - DATA_TYPE_UUID
        - DATA_TYPE_ARRAY
        - DATA_TYPE_GEOMETRY
        - DATA_TYPE_UNKNOWN
        - DATA_TYPE_TIME
        - DATA_TYPE_TIMESTAMP
      description: |-
        DataType classifies PostgreSQL column types into high-level categories
         for UI rendering and validation.
    querylane.console.v1alpha1.Database:
      type: object
      properties:
        name:
          type: string
          title: name
          description: |-
            Output-only identifier. The unique resource name of the database.
             Format: instances/{instance}/databases/{database}
        displayName:
          type: string
          title: display_name
          description: Output-only. The display name of the database for UI presentation.
        characterSet:
          type: string
          title: character_set
          description: Output-only. The default character set of the database.
        collation:
          type: string
          title: collation
          description: Output-only. The default collation of the database.
        owner:
          type: string
          title: owner
          description: Output-only. The PostgreSQL role that owns this database.
        lastDdlTime:
          title: last_ddl_time
          description: Output-only. The last time a DDL operation was performed on this database.
          type: string
          format: date-time
        isSystemDatabase:
          type: boolean
          title: is_system_database
          description: |-
            Output-only. Whether this is a system database that should typically
             be hidden from end users (e.g., template0, template1, postgres).
        createTime:
          title: create_time
          description: Output-only. The time when the database was created.
          type: string
          format: date-time
      title: Database
      additionalProperties: false
      description: |-
        A Database represents a logical container for schemas and tables within an
         Instance. This resource reflects the current state of the external database system.
    querylane.console.v1alpha1.DatabaseQueryInsights:
      type: object
      properties:
        topQueries:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.QueryRuntimeInsight'
          title: top_queries
          maxItems: 10
          description: Top pg_stat_statements entries by total execution time.
        sequentialScanHotspots:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.SequentialScanHotspot'
          title: sequential_scan_hotspots
          maxItems: 10
          description: Tables with sequential read pressure from pg_stat_user_tables.
        tableCacheHits:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.TableCacheHitInsight'
          title: table_cache_hits
          maxItems: 10
          description: Table-level heap block cache hit ratios from pg_statio_user_tables.
        observedAt:
          title: observed_at
          description: Timestamp when the metrics were observed.
          type: string
          format: date-time
        queryStatsAvailable:
          type: boolean
          title: query_stats_available
          description: Whether pg_stat_statements could be queried.
        tableStatsAvailable:
          type: boolean
          title: table_stats_available
          description: Whether table statistics views could be queried.
      title: DatabaseQueryInsights
      required:
        - observedAt
      additionalProperties: false
      description: |
        Live query optimization signals for a PostgreSQL database. Statistics are
         cumulative since PostgreSQL last reset the underlying stats views.
        table_insights_empty_when_unavailable // table insights must be empty when table stats are unavailable
        top_queries_empty_when_unavailable // top_queries must be empty when query stats are unavailable
    querylane.console.v1alpha1.DefaultPrivilegeObjectType:
