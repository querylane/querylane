  /querylane.console.v1alpha1.RoleService/ListPublicGrants:
    post:
      x-connectrpc-method-kind: unary
      tags:
        - RoleService
      summary: ListPublicGrants
      description: |-
        Lists the privileges available to PUBLIC within a Database — privileges
         every role implicitly holds regardless of its own grants. Returns the
         effective database-level PUBLIC privileges (CONNECT/TEMPORARY, synthesized
         from PostgreSQL defaults when datacl is unset) plus every explicit
         "GRANT ... TO PUBLIC" ACL entry on schemas and objects. Categorical defaults
         that are not per-object enumerable (EXECUTE on every function, the
         public-schema USAGE default) are not returned as rows; the UI surfaces those
         as guidance. Completes the "no direct grants does not mean no access" story.
      operationId: RoleService_ListPublicGrants
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/querylane.console.v1alpha1.ListPublicGrantsRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/querylane.console.v1alpha1.ListPublicGrantsResponse'
  /querylane.console.v1alpha1.RoleService/ListRoleDefaultPrivileges:
