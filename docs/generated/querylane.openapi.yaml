          type: integer
          title: page_size
          maximum: 1000
          minimum: 0
          format: int32
          description: |-
            Optional. The maximum number of schemas to return. Server may return fewer.
             If unspecified or 0, server will choose a reasonable default (typically 50).
             Maximum value is 1000.
        pageToken:
          type: string
          title: page_token
          description: |-
            Optional. A page token received from a previous `ListSchemas` call.
             Provide this to retrieve the next page of results.
        filter:
          type: string
          title: filter
          description: |-
            Optional. Filter expression (an AIP-160 subset: `=`, `!=`, the `:`
             case-insensitive substring operator, combined with `AND`). Values are
             quoted strings or the bare bools true/false. Filterable fields:
               - name, owner (string; support the `:` substring operator)
               - is_system_schema (bool)
             Examples:
               - is_system_schema = false (exclude system schemas)
               - owner = "postgres"
               - name:"app"
        orderBy:
          type: string
          title: order_by
          description: |-
            Optional. Ordering expression following AIP-132 syntax.
             Supported fields: name, display_name, owner, last_ddl_time
             Default: "name asc"

             Examples:
               - "name asc"
               - "last_ddl_time desc, name asc"
               - "owner desc"
      title: ListSchemasRequest
      additionalProperties: false
    querylane.console.v1alpha1.ListSchemasResponse:
      type: object
      properties:
        schemas:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.Schema'
          title: schemas
          description: The list of schemas found in the database.
        nextPageToken:
          type: string
          title: next_page_token
          description: |-
            A token to retrieve the next page of results.
             If this field is empty, there are no subsequent pages.
        syncMetadata:
          title: sync_metadata
          description: Output-only. Freshness and sync status for this catalog list.
          $ref: '#/components/schemas/querylane.console.v1alpha1.CatalogSyncMetadata'
      title: ListSchemasResponse
      additionalProperties: false
    querylane.console.v1alpha1.ListTableColumnsRequest:
