      type: object
      properties:
        databases:
          type: array
          items:
            $ref: '#/components/schemas/querylane.console.v1alpha1.Database'
          title: databases
          description: The list of databases found in the instance.
        nextPageToken:
          type: string
          title: next_page_token
          description: |-
            A token to retrieve the next page of results.
             If this field is empty, there are no subsequent pages.
      title: ListDatabasesResponse
      additionalProperties: false
