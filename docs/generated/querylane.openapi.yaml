    querylane.console.v1alpha1.IOMetrics:
      type: object
      properties:
        reads:
          type:
            - integer
            - string
          title: reads
          minimum: 0
          format: int64
          description: Total read operations since last stats reset.
        readBytes:
          type:
            - integer
            - string
          title: read_bytes
          minimum: 0
          format: int64
          description: |-
            Total read bytes since last stats reset. On PostgreSQL 16/17 this is
             derived from reads * op_bytes; on PostgreSQL 18+ it uses read_bytes.
        writes:
          type:
            - integer
            - string
          title: writes
          minimum: 0
          format: int64
          description: Total write operations since last stats reset.
        writeBytes:
          type:
            - integer
            - string
          title: write_bytes
          minimum: 0
          format: int64
          description: |-
            Total write bytes since last stats reset. On PostgreSQL 16/17 this is
             derived from writes * op_bytes; on PostgreSQL 18+ it uses write_bytes.
        extends:
          type:
            - integer
            - string
          title: extends
          minimum: 0
          format: int64
          description: Total relation extend operations since last stats reset.
        extendBytes:
          type:
            - integer
            - string
          title: extend_bytes
          minimum: 0
          format: int64
          description: |-
            Total extended bytes since last stats reset. On PostgreSQL 16/17 this is
             derived from extends * op_bytes; on PostgreSQL 18+ it uses extend_bytes.
        fsyncs:
          type:
            - integer
            - string
          title: fsyncs
          minimum: 0
          format: int64
          description: Total fsync calls since last stats reset.
      title: IOMetrics
      additionalProperties: false
      description: |
        PostgreSQL I/O statistics aggregated across pg_stat_io rows.
        io_bytes_require_operations // I/O byte counters must be zero when the matching operation counter is zero
    querylane.console.v1alpha1.IdentityGeneration:
      type: string
