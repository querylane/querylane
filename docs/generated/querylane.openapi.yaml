          description: Output-only. The time at which the instance record was created.
          type: string
          format: date-time
        updateTime:
          title: update_time
          description: Output-only. The time at which the instance record was last updated.
          type: string
          format: date-time
        lastConnectionCheckTime:
          title: last_connection_check_time
          description: |-
            Output-only. The time of the most recent live connection probe for this
